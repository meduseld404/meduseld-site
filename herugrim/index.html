<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/png" sizes="96x96" href="/herugrim/favicon/favicon-96x96.png" />
    <link rel="icon" type="image/svg+xml" href="/herugrim/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/herugrim/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/herugrim/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/herugrim/favicon/site.webmanifest" />
    <title>Herugrim — Discord OIDC for Cloudflare Access</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0a 70%);
        background-color: #0a0a0a;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        margin: 0;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom)
          env(safe-area-inset-left);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .content {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      .logo {
        max-width: 250px;
        opacity: 0;
        animation: fadeIn 1.2s ease forwards;
      }
      .title {
        color: #e6c65c;
        font-weight: 600;
        margin-top: 24px;
        opacity: 0;
        animation: fadeIn 1.2s ease 0.3s forwards;
      }
      .subtitle {
        color: rgba(255, 255, 255, 0.6);
        font-size: 0.95rem;
        margin-top: 8px;
        opacity: 0;
        animation: fadeIn 1.2s ease 0.5s forwards;
        text-align: center;
        max-width: 420px;
      }
      .deploy-btn {
        opacity: 0;
        animation: fadeIn 1.2s ease 0.7s forwards;
      }
      .deploy-btn img {
        height: 42px;
      }
      .btn-github {
        opacity: 0;
        animation: fadeIn 1.2s ease 0.9s forwards;
      }
      .actions {
        margin-top: 28px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="content">
      <img
        src="https://github.com/user-attachments/assets/a992766f-24d7-4271-88b4-62333265a1bf"
        alt="Herugrim"
        class="logo"
      />
      <h1 class="title">Herugrim</h1>
      <p class="subtitle">
        One-click Discord OIDC provider for Cloudflare Access. Authenticate users with their Discord
        account — no separate identity service needed.
      </p>
      <div class="actions">
        <a
          href="https://deploy.workers.cloudflare.com/?url=https://github.com/meduseld-io/herugrim"
          target="_blank"
          class="deploy-btn"
        >
          <img
            src="https://deploy.workers.cloudflare.com/button"
            alt="Deploy to Cloudflare Workers"
          />
        </a>
        <a
          href="https://github.com/meduseld-io/herugrim"
          target="_blank"
          class="btn btn-outline-warning btn-github px-4 py-2"
        >
          View on GitHub
        </a>
        <button
          class="btn btn-sm btn-link text-muted text-decoration-none contact-btn"
          data-bs-toggle="modal"
          data-bs-target="#contactModal"
          style="opacity: 0; animation: fadeIn 1.2s ease 1.1s forwards; font-size: 0.8rem"
        >
          <i class="bi bi-envelope me-1"></i>
          Contact
        </button>
      </div>
    </div>

    <footer class="text-center py-3 mt-auto" style="border-top: 1px solid rgba(230, 198, 92, 0.2)">
      <p class="text-light mb-0" style="font-size: 0.85rem">
        &copy;
        <span id="copyright-year"></span>
        <a
          href="https://github.com/meduseld-io"
          target="_blank"
          class="text-warning text-decoration-none"
        >
          meduseld.io
        </a>
      </p>
      <p class="text-light mb-0" style="font-size: 0.75rem">
        <a
          id="version-badge"
          href="https://github.com/meduseld-io/herugrim/releases"
          target="_blank"
          class="text-warning text-decoration-none"
        >
          loading...
        </a>
      </p>
    </footer>

    <!-- Contact Modal -->
    <div
      class="modal fade"
      id="contactModal"
      tabindex="-1"
      aria-labelledby="contactModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content bg-dark text-light border-warning">
          <div class="modal-header py-2" style="border-bottom: 1px solid rgba(230, 198, 92, 0.3)">
            <h6 class="modal-title" id="contactModalLabel" style="color: #e6c65c">
              <i class="bi bi-envelope me-2"></i>
              Contact
            </h6>
            <button
              type="button"
              class="btn-close btn-close-white btn-sm"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body text-center py-3">
            <p class="mb-2" style="font-size: 0.85rem; color: rgba(255, 255, 255, 0.7)">
              Questions, issues, or feedback?
            </p>
            <a href="mailto:404@meduseld.io" class="btn btn-outline-warning btn-sm px-3">
              <i class="bi bi-send me-1"></i>
              404@meduseld.io
            </a>
          </div>
        </div>
      </div>
    </div>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.getElementById('copyright-year').textContent = new Date().getFullYear();

      (function () {
        var badge = document.getElementById('version-badge');
        if (!badge) return;
        fetch('https://api.github.com/repos/meduseld-io/herugrim/releases/latest')
          .then(function (res) {
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
          })
          .then(function (data) {
            if (data.tag_name) {
              badge.textContent = data.tag_name;
              badge.href = data.html_url;
            }
          })
          .catch(function (err) {
            console.error('Failed to fetch latest Herugrim release version:', err);
            badge.textContent = 'v0.1.0-alpha';
            badge.href = 'https://github.com/meduseld-io/herugrim/releases';
          });
      })();
    </script>
  </body>
</html>
