<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="icon" type="image/x-icon" href="https://meduseld.io/static/favicon.ico" />
    <title>Herugrim — Discord OIDC for Cloudflare Access</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0a 70%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .logo {
        max-width: 250px;
        opacity: 0;
        animation: fadeIn 1.2s ease forwards;
      }
      .title {
        color: #e6c65c;
        font-weight: 600;
        margin-top: 24px;
        opacity: 0;
        animation: fadeIn 1.2s ease 0.3s forwards;
      }
      .subtitle {
        color: rgba(255, 255, 255, 0.6);
        font-size: 0.95rem;
        margin-top: 8px;
        opacity: 0;
        animation: fadeIn 1.2s ease 0.5s forwards;
      }
      .btn-github {
        margin-top: 28px;
        opacity: 0;
        animation: fadeIn 1.2s ease 0.7s forwards;
      }
      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <img
      src="https://github.com/user-attachments/assets/a992766f-24d7-4271-88b4-62333265a1bf"
      alt="Herugrim"
      class="logo"
    />
    <h1 class="title">Herugrim</h1>
    <p class="subtitle">Discord OIDC Provider for Cloudflare Access</p>
    <a
      href="https://github.com/meduseld-io/herugrim"
      target="_blank"
      class="btn btn-outline-warning btn-github px-4 py-2"
    >
      View on GitHub
    </a>
  </body>
</html>
