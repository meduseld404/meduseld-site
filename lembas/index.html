<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Lembas - Shopping List</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#1a6b47" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --green-900: #0d3b26;
        --green-700: #1a6b47;
        --green-600: #22875a;
        --green-500: #2d9e6b;
        --green-100: #dcf5e7;
        --green-50: #f0faf4;
        --gray-50: #f8faf9;
        --gray-100: #f1f3f2;
        --gray-200: #e2e5e3;
        --gray-300: #c8ccc9;
        --gray-400: #9ca39e;
        --gray-500: #6b736d;
        --gray-600: #4a514c;
        --gray-800: #1e2420;
        --red-500: #dc3545;
        --red-50: #fef2f2;
        --gold-500: #e6a817;
        --gold-400: #f0c040;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
        --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.1);
        --radius: 12px;
        --radius-sm: 8px;
        --radius-full: 9999px;
      }

      body {
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif;
        background: var(--gray-50);
        color: var(--gray-800);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        padding-bottom: env(safe-area-inset-bottom, 0);
      }

      header {
        background: linear-gradient(135deg, var(--green-700) 0%, var(--green-900) 100%);
        color: #fff;
        padding: 14px 20px;
        padding-top: calc(14px + env(safe-area-inset-top, 0));
        display: flex;
        align-items: center;
        gap: 12px;
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
      }
      header img {
        height: 32px;
        width: 32px;
        object-fit: contain;
      }
      header h1 {
        font-size: 1.15rem;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      header .subtitle {
        font-weight: 400;
        font-size: 0.8rem;
        opacity: 0.65;
        margin-left: 6px;
      }

      .tabs {
        display: flex;
        background: #fff;
        border-bottom: 1px solid var(--gray-200);
        position: sticky;
        top: 60px;
        z-index: 90;
      }
      .tab {
        flex: 1;
        padding: 13px 12px;
        text-align: center;
        font-family: inherit;
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.01em;
        cursor: pointer;
        border: none;
        border-bottom: 2.5px solid transparent;
        color: var(--gray-400);
        background: none;
        transition:
          color 0.2s,
          border-color 0.2s;
      }
      .tab:hover {
        color: var(--gray-600);
      }
      .tab.active {
        color: var(--green-700);
        border-bottom-color: var(--green-700);
      }

      .container {
        max-width: 560px;
        margin: 0 auto;
        padding: 16px 16px 32px;
      }

      .add-bar {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
        position: relative;
      }
      .add-bar input {
        flex: 1;
        padding: 12px 16px;
        border: 2px solid var(--gray-200);
        border-radius: var(--radius);
        font-family: inherit;
        font-size: 0.95rem;
        color: var(--gray-800);
        outline: none;
        background: #fff;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .add-bar input::placeholder {
        color: var(--gray-400);
      }
      .add-bar input:focus {
        border-color: var(--green-600);
        box-shadow: 0 0 0 3px rgba(34, 135, 90, 0.12);
      }
      .add-bar button {
        padding: 12px 20px;
        background: var(--green-700);
        color: #fff;
        border: none;
        border-radius: var(--radius);
        font-family: inherit;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
        transition:
          background 0.15s,
          transform 0.1s;
      }
      .add-bar button:hover {
        background: var(--green-600);
      }
      .add-bar button:active {
        background: var(--green-900);
        transform: scale(0.97);
      }

      .suggestions {
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        right: 80px;
        background: #fff;
        border: 1px solid var(--gray-200);
        border-radius: var(--radius-sm);
        max-height: 200px;
        overflow-y: auto;
        z-index: 200;
        display: none;
        box-shadow: var(--shadow-lg);
      }
      .suggestions.show {
        display: block;
      }
      .suggestion-item {
        padding: 11px 14px;
        cursor: pointer;
        font-size: 0.88rem;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: background 0.1s;
      }
      .suggestion-item:hover,
      .suggestion-item.highlighted {
        background: var(--green-50);
      }
      .suggestion-item .star {
        color: var(--gold-500);
        font-size: 0.75rem;
      }

      .section-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--gray-400);
        margin: 20px 0 8px;
        font-weight: 700;
      }

      .list-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }
      .list-header h2 {
        font-size: 0.9rem;
        font-weight: 700;
        color: var(--gray-600);
      }
      .list-header h2 span {
        font-weight: 500;
        color: var(--gray-400);
      }
      .clear-btn {
        font-family: inherit;
        font-size: 0.78rem;
        font-weight: 500;
        color: var(--red-500);
        background: none;
        border: 1.5px solid var(--red-500);
        padding: 5px 12px;
        border-radius: var(--radius-full);
        cursor: pointer;
        transition:
          background 0.15s,
          color 0.15s;
      }
      .clear-btn:hover {
        background: var(--red-50);
      }

      .item {
        display: flex;
        align-items: center;
        gap: 12px;
        background: #fff;
        padding: 14px 16px;
        border-radius: var(--radius);
        margin-bottom: 8px;
        box-shadow: var(--shadow-sm);
        border: 1px solid var(--gray-100);
        transition:
          opacity 0.25s,
          transform 0.15s,
          box-shadow 0.15s;
      }
      .item:hover {
        box-shadow: var(--shadow-md);
      }
      .item.checked {
        opacity: 0.45;
      }
      .item.checked .item-name {
        text-decoration: line-through;
        color: var(--gray-400);
      }

      .item input[type='checkbox'] {
        width: 20px;
        height: 20px;
        accent-color: var(--green-700);
        cursor: pointer;
        flex-shrink: 0;
      }
      .item-name {
        flex: 1;
        font-size: 0.92rem;
        font-weight: 500;
        word-break: break-word;
      }

      .qty-controls {
        display: flex;
        align-items: center;
        gap: 2px;
        background: var(--gray-100);
        border-radius: var(--radius-full);
        padding: 2px;
      }
      .qty-btn {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        border: none;
        background: #fff;
        cursor: pointer;
        font-family: inherit;
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--gray-600);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.1s;
        box-shadow: var(--shadow-sm);
      }
      .qty-btn:hover {
        background: var(--gray-200);
      }
      .qty-btn:active {
        transform: scale(0.92);
      }
      .qty-val {
        min-width: 24px;
        text-align: center;
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--gray-600);
      }

      .item-actions {
        display: flex;
        gap: 2px;
      }
      .item-btn {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 1.05rem;
        padding: 6px;
        border-radius: var(--radius-sm);
        line-height: 1;
        transition:
          background 0.1s,
          transform 0.1s;
      }
      .item-btn:hover {
        background: var(--gray-100);
      }
      .item-btn:active {
        transform: scale(0.9);
      }
      .item-btn.star-btn {
        color: var(--gray-300);
      }
      .item-btn.star-btn.starred {
        color: var(--gold-400);
      }
      .item-btn.delete-btn {
        color: var(--red-500);
        opacity: 0.6;
      }
      .item-btn.delete-btn:hover {
        opacity: 1;
      }

      .empty {
        text-align: center;
        padding: 48px 20px;
        color: var(--gray-400);
      }
      .empty-icon {
        font-size: 2.8rem;
        margin-bottom: 12px;
      }
      .empty p {
        font-size: 0.88rem;
        line-height: 1.5;
      }

      .regulars-info {
        font-size: 0.84rem;
        color: var(--gray-500);
        margin-bottom: 16px;
        line-height: 1.5;
      }

      .regulars-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 8px;
      }
      .regular-chip {
        display: flex;
        align-items: center;
        gap: 8px;
        background: #fff;
        padding: 12px 14px;
        border-radius: var(--radius);
        cursor: pointer;
        font-size: 0.88rem;
        font-weight: 500;
        box-shadow: var(--shadow-sm);
        border: 2px solid transparent;
        transition:
          border-color 0.2s,
          background 0.2s,
          transform 0.1s;
      }
      .regular-chip:hover {
        border-color: var(--green-500);
        transform: translateY(-1px);
      }
      .regular-chip.in-list {
        background: var(--green-100);
        border-color: var(--green-500);
      }
      .regular-chip .remove-regular {
        margin-left: auto;
        color: var(--red-500);
        background: none;
        border: none;
        cursor: pointer;
        font-size: 0.85rem;
        padding: 0 2px;
        line-height: 1;
        opacity: 0.5;
        transition: opacity 0.15s;
      }
      .regular-chip .remove-regular:hover {
        opacity: 1;
      }

      @media (max-width: 400px) {
        .regulars-grid {
          grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        }
        .container {
          padding: 12px 12px 24px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <img src="logo.png" alt="Lembas" />
      <h1>
        Lembas
        <span class="subtitle">Shopping List</span>
      </h1>
    </header>

    <div class="tabs" role="tablist">
      <button class="tab active" data-tab="list" role="tab" aria-selected="true">
        Shopping List
      </button>
      <button class="tab" data-tab="regulars" role="tab" aria-selected="false">Regulars</button>
    </div>

    <div class="container" id="list-view">
      <div class="add-bar">
        <input
          type="text"
          id="item-input"
          placeholder="Add an item..."
          autocomplete="off"
          aria-label="Item name"
        />
        <button id="add-btn" aria-label="Add item">Add</button>
        <div class="suggestions" id="suggestions"></div>
      </div>
      <div class="list-header">
        <h2>
          Items
          <span id="item-count"></span>
        </h2>
        <button class="clear-btn" id="clear-checked-btn">Clear checked</button>
      </div>
      <div id="items-container"></div>
    </div>

    <div class="container" id="regulars-view" style="display: none">
      <p class="regulars-info">
        Tap a regular item to add it to your current list. Star items from the shopping list to save
        them here.
      </p>
      <div id="regulars-container"></div>
    </div>
  </body>
</html>

  <script>
    const STORAGE_KEY = 'lembas_items';
    const REGULARS_KEY = 'lembas_regulars';

    let items = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    let regulars = JSON.parse(localStorage.getItem(REGULARS_KEY) || '[]');

    const $input = document.getElementById('item-input');
    const $addBtn = document.getElementById('add-btn');
    const $itemsContainer = document.getElementById('items-container');
    const $regularsContainer = document.getElementById('regulars-container');
    const $suggestions = document.getElementById('suggestions');
    const $itemCount = document.getElementById('item-count');
    const $clearBtn = document.getElementById('clear-checked-btn');
    const $listView = document.getElementById('list-view');
    const $regularsView = document.getElementById('regulars-view');

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
      localStorage.setItem(REGULARS_KEY, JSON.stringify(regulars));
    }

    function addItem(name, qty = 1) {
      name = name.trim();
      if (!name) return;
      const existing = items.find(i => i.name.toLowerCase() === name.toLowerCase());
      if (existing) {
        existing.qty += 1;
      } else {
        items.push({ id: Date.now(), name, qty, checked: false });
      }
      save();
      renderList();
      $input.value = '';
      hideSuggestions();
    }

    function renderList() {
      const unchecked = items.filter(i => !i.checked);
      const checked = items.filter(i => i.checked);
      const total = items.length;
      const done = checked.length;
      $itemCount.textContent = total ? `(${done}/${total})` : '';

      let html = '';
      if (!items.length) {
        html = '<div class="empty"><div class="empty-icon">🛒</div><p>Your list is empty.<br>Add items above or pick from your regulars.</p></div>';
      } else {
        if (unchecked.length) {
          html += unchecked.map(i => itemHTML(i)).join('');
        }
        if (checked.length) {
          html += '<div class="section-label">Done</div>';
          html += checked.map(i => itemHTML(i)).join('');
        }
      }
      $itemsContainer.innerHTML = html;
    }

    function itemHTML(item) {
      const isRegular = regulars.some(r => r.toLowerCase() === item.name.toLowerCase());
      return `
        <div class="item ${item.checked ? 'checked' : ''}" data-id="${item.id}">
          <input type="checkbox" ${item.checked ? 'checked' : ''} aria-label="Mark ${item.name} as done">
          <span class="item-name">${esc(item.name)}</span>
          <div class="qty-controls">
            <button class="qty-btn" data-action="qty-down" aria-label="Decrease quantity">−</button>
            <span class="qty-val">${item.qty}</span>
            <button class="qty-btn" data-action="qty-up" aria-label="Increase quantity">+</button>
          </div>
          <div class="item-actions">
            <button class="item-btn star-btn ${isRegular ? 'starred' : ''}" data-action="star" aria-label="${isRegular ? 'Remove from regulars' : 'Add to regulars'}">★</button>
            <button class="item-btn delete-btn" data-action="delete" aria-label="Remove item">✕</button>
          </div>
        </div>`;
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    $itemsContainer.addEventListener('click', e => {
      const itemEl = e.target.closest('.item');
      if (!itemEl) return;
      const id = Number(itemEl.dataset.id);
      const item = items.find(i => i.id === id);
      if (!item) return;

      if (e.target.type === 'checkbox') {
        item.checked = e.target.checked;
        save();
        renderList();
        return;
      }

      const action = e.target.dataset.action;
      if (action === 'delete') {
        items = items.filter(i => i.id !== id);
        save();
        renderList();
      } else if (action === 'star') {
        toggleRegular(item.name);
        save();
        renderList();
      } else if (action === 'qty-up') {
        item.qty += 1;
        save();
        renderList();
      } else if (action === 'qty-down') {
        if (item.qty > 1) {
          item.qty -= 1;
          save();
          renderList();
        }
      }
    });

    function toggleRegular(name) {
      const idx = regulars.findIndex(r => r.toLowerCase() === name.toLowerCase());
      if (idx >= 0) {
        regulars.splice(idx, 1);
      } else {
        regulars.push(name);
      }
    }

    function renderRegulars() {
      if (!regulars.length) {
        $regularsContainer.innerHTML = '<div class="empty"><div class="empty-icon">⭐</div><p>No regular items yet.<br>Star items from your shopping list to save them here.</p></div>';
        return;
      }
      const sorted = [...regulars].sort((a, b) => a.localeCompare(b));
      $regularsContainer.innerHTML = '<div class="regulars-grid">' + sorted.map(name => {
        const inList = items.some(i => i.name.toLowerCase() === name.toLowerCase());
        return `<div class="regular-chip ${inList ? 'in-list' : ''}" data-name="${esc(name)}">
          <span>${esc(name)}</span>
          <button class="remove-regular" data-action="remove" aria-label="Remove ${name} from regulars">✕</button>
        </div>`;
      }).join('') + '</div>';
    }

    $regularsContainer.addEventListener('click', e => {
      const chip = e.target.closest('.regular-chip');
      if (!chip) return;
      const name = chip.dataset.name;

      if (e.target.dataset.action === 'remove') {
        regulars = regulars.filter(r => r.toLowerCase() !== name.toLowerCase());
        save();
        renderRegulars();
        return;
      }

      addItem(name);
      renderRegulars();
    });

    $clearBtn.addEventListener('click', () => {
      items = items.filter(i => !i.checked);
      save();
      renderList();
    });

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => { t.classList.remove('active'); t.setAttribute('aria-selected', 'false'); });
        tab.classList.add('active');
        tab.setAttribute('aria-selected', 'true');
        if (tab.dataset.tab === 'list') {
          $listView.style.display = '';
          $regularsView.style.display = 'none';
        } else {
          $listView.style.display = 'none';
          $regularsView.style.display = '';
          renderRegulars();
        }
      });
    });

    $addBtn.addEventListener('click', () => addItem($input.value));
    $input.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const highlighted = $suggestions.querySelector('.highlighted');
        if (highlighted) {
          addItem(highlighted.dataset.name);
        } else {
          addItem($input.value);
        }
      } else if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
        e.preventDefault();
        navigateSuggestions(e.key === 'ArrowDown' ? 1 : -1);
      } else if (e.key === 'Escape') {
        hideSuggestions();
      }
    });

    $input.addEventListener('input', () => {
      const val = $input.value.trim().toLowerCase();
      if (!val) { hideSuggestions(); return; }
      const matches = regulars.filter(r => r.toLowerCase().includes(val));
      if (!matches.length) { hideSuggestions(); return; }
      $suggestions.innerHTML = matches.map(m =>
        `<div class="suggestion-item" data-name="${esc(m)}"><span class="star">★</span>${esc(m)}</div>`
      ).join('');
      $suggestions.classList.add('show');
    });

    $suggestions.addEventListener('click', e => {
      const item = e.target.closest('.suggestion-item');
      if (item) addItem(item.dataset.name);
    });

    function hideSuggestions() { $suggestions.classList.remove('show'); }
    function navigateSuggestions(dir) {
      const items = [...$suggestions.querySelectorAll('.suggestion-item')];
      if (!items.length) return;
      const current = items.findIndex(i => i.classList.contains('highlighted'));
      items.forEach(i => i.classList.remove('highlighted'));
      let next = current + dir;
      if (next < 0) next = items.length - 1;
      if (next >= items.length) next = 0;
      items[next].classList.add('highlighted');
    }

    document.addEventListener('click', e => {
      if (!e.target.closest('.add-bar')) hideSuggestions();
    });

    renderList();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(e => console.error('SW registration failed:', e));
    }
  </script>
</body>
</html>
