<!doctype html>

<html lang="en">
  <head>
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="https://meduseld.io/static/apple-touch-icon.png"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Meduseld" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1f14" />
    <link rel="icon" type="image/x-icon" href="https://meduseld.io/static/favicon.ico" />
    <title>Meduseld - 404 Server Not Found</title>

    <link rel="stylesheet" href="https://meduseld.io/static/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="d-flex flex-column min-vh-100 text-light" style="background: transparent">
    <div
      class="d-flex flex-column justify-content-center align-items-center text-center flex-grow-1"
    >
      <img
        src="https://meduseld.io/static/meduseldminimal.png"
        style="max-height: 140px; margin-bottom: 30px"
      />

      <h1 style="color: #e6c65c; font-weight: 600">Meduseld</h1>

      <p style="max-width: 600px; opacity: 0.8">404 Server Not Found</p>

      <a href="https://services.meduseld.io" class="btn btn-warning mt-4 px-4 py-2">
        Enter the Great Hall
      </a>
    </div>

    <!-- Footer -->
    <footer class="text-center py-3 mt-auto" style="border-top: 1px solid rgba(230, 198, 92, 0.2)">
      <p class="text-light mb-0" style="font-size: 0.85rem">
        &copy;
        <span id="copyright-year"></span>
        <a href="https://quietarca.de" target="_blank" class="text-warning text-decoration-none">
          quietarcade
        </a>
        ~ All rights reserved.
      </p>
      <p class="text-light mb-0" style="font-size: 0.75rem">
        <a
          id="version-badge"
          href="https://github.com/meduseld404/meduseld-site/releases"
          target="_blank"
          class="text-light text-decoration-none"
        >
          loading...
        </a>
      </p>
    </footer>

    <script>
      document.getElementById('copyright-year').textContent = new Date().getFullYear();

      (function () {
        var badge = document.getElementById('version-badge');
        if (!badge) return;
        fetch('https://api.github.com/repos/meduseld404/meduseld-site/releases/latest')
          .then(function (res) {
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
          })
          .then(function (data) {
            if (data.tag_name) {
              badge.textContent = data.tag_name;
              badge.href = data.html_url;
            }
          })
          .catch(function (err) {
            console.error('Failed to fetch latest release version:', err);
            badge.textContent = 'v?.?.?';
          });
      })();
    </script>
  </body>
</html>
