<!doctype html>
<html lang="en">
  <head>
    <link rel="apple-touch-icon" sizes="180x180" href="https://meduseld.io/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1f14" />
    <link rel="icon" type="image/x-icon" href="https://meduseld.io/static/favicon.ico" />
    <meta charset="UTF-8" />
    <title>Meduseld - My Profile</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://meduseld.io/static/style.css" />
    <style>
      .profile-avatar {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        border: 3px solid #e6c65c;
        object-fit: cover;
      }
      .achievement-card {
        background: rgba(20, 36, 26, 0.85);
        border: 1px solid rgba(108, 117, 125, 0.3);
        border-radius: 10px;
        padding: 1rem;
        text-align: center;
        transition: all 0.2s;
        position: relative;
        min-height: 140px;
      }
      .achievement-card.unlocked {
        border-color: rgba(230, 198, 92, 0.5);
      }
      .achievement-card.locked {
        opacity: 0.4;
        filter: grayscale(0.8);
      }
      .achievement-card .ach-icon {
        font-size: 2rem;
        margin-bottom: 0.5rem;
      }
      .achievement-card.unlocked .ach-icon {
        color: #e6c65c;
      }
      .achievement-card.locked .ach-icon {
        color: #6c757d;
      }
      .achievement-card .ach-name {
        font-size: 0.85rem;
        font-weight: 600;
        color: #e4d9b5;
      }
      .achievement-card .ach-desc {
        font-size: 0.7rem;
        color: #a0a0b8;
        margin-top: 0.25rem;
      }
      .achievement-card .ach-date {
        font-size: 0.65rem;
        color: #6c757d;
        margin-top: 0.5rem;
      }
      .stat-card {
        background: rgba(20, 36, 26, 0.85);
        border: 1px solid rgba(230, 198, 92, 0.3);
        border-radius: 10px;
        padding: 1rem;
        text-align: center;
      }
      .stat-value {
        font-size: 1.5rem;
        font-weight: 700;
        color: #e6c65c;
      }
      .stat-label {
        font-size: 0.75rem;
        color: #a0a0b8;
      }
      .new-badge {
        position: absolute;
        top: -6px;
        right: -6px;
        background: #28a745;
        color: #fff;
        font-size: 0.6rem;
        padding: 2px 6px;
        border-radius: 8px;
        font-weight: 700;
      }
    </style>
  </head>
  <body class="text-light" style="background: transparent">
    <div class="container-fluid pt-3">
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
        <a href="https://services.meduseld.io" class="btn btn-warning btn-sm">
          <i class="bi bi-arrow-left"></i>
          Back to Services
        </a>
        <div id="profile-container" style="display: none; position: relative"></div>
      </div>
    </div>
    <div class="container py-4">
      <!-- Profile Header -->
      <div class="text-center mb-4" id="profile-header">
        <div class="spinner-border text-warning" role="status"></div>
        <p class="mt-2 text-muted">Loading profile...</p>
      </div>

      <!-- Stats Row -->
      <div class="row g-3 justify-content-center mb-4" id="stats-row" style="display: none"></div>

      <!-- Achievements -->
      <div id="achievements-section" style="display: none">
        <h4 class="text-center mb-3" style="color: #e6c65c">
          <i class="bi bi-award me-2"></i>
          Achievements
        </h4>
        <div class="text-center mb-3">
          <span class="badge bg-warning text-dark" id="ach-count"></span>
        </div>
        <div class="row g-3 justify-content-center" id="achievements-grid"></div>
      </div>
    </div>

    <footer class="text-center py-3 mt-auto" style="border-top: 1px solid rgba(230, 198, 92, 0.2)">
      <p class="text-light mb-0" style="font-size: 0.85rem">
        &copy;
        <span id="copyright-year"></span>
        <a href="https://quietarca.de" target="_blank" class="text-warning text-decoration-none">
          quietarcade
        </a>
        ~ All rights reserved.
      </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://meduseld.io/static/auth.js"></script>
    <script>
      var HEALTH_BASE = 'https://health.meduseld.io/check';
      document.getElementById('copyright-year').textContent = new Date().getFullYear();

      if (typeof MeduseldAuth !== 'undefined') {
        if (!MeduseldAuth.requireAuth()) return; // Redirect to login if no cookie
        MeduseldAuth.renderProfile('profile-container');
        MeduseldAuth.syncUser().then(function () {
          MeduseldAuth.renderProfile('profile-container');
        });
      }

      function loadProfile() {
        var cfCookie = (document.cookie.match(/(?:^|; )CF_Authorization=([^;]*)/) || [])[1] || '';
        fetch(HEALTH_BASE + '/profile?cf_token=' + encodeURIComponent(cfCookie))
          .then(function (r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json();
          })
          .then(function (data) {
            renderProfileHeader(data);
            renderStats(data.trivia || {});
            renderAchievements(data.achievements || [], data.new_achievements || []);
          })
          .catch(function (err) {
            console.error('Failed to load profile:', err);
            document.getElementById('profile-header').innerHTML =
              '<p class="text-danger">Could not load profile. Make sure you are logged in.</p>';
          });
      }

      function renderProfileHeader(data) {
        var avatarHtml = data.avatar_url
          ? '<img src="' + data.avatar_url + '" class="profile-avatar mb-3" alt="" />'
          : '<div class="profile-avatar d-flex align-items-center justify-content-center mx-auto mb-3" style="background:rgba(108,117,125,0.3);border:3px solid #e6c65c"><i class="bi bi-person-fill" style="font-size:2.5rem;color:#6c757d"></i></div>';
        var roleBadge =
          data.role === 'admin'
            ? ' <span class="badge" style="background:#e6c65c;color:#0b1f14;font-size:0.7rem;">Admin</span>'
            : '';
        var memberSince = data.created_at
          ? new Date(data.created_at).toLocaleDateString(undefined, {
              month: 'long',
              year: 'numeric',
            })
          : '';

        document.getElementById('profile-header').innerHTML =
          avatarHtml +
          '<h2 style="color:#e6c65c;font-weight:600">' +
          escapeHtml(data.display_name || data.username) +
          roleBadge +
          '</h2>' +
          '<p class="text-muted mb-0">@' +
          escapeHtml(data.username) +
          '</p>' +
          (memberSince
            ? '<p class="text-muted" style="font-size:0.8rem">Member since ' + memberSince + '</p>'
            : '');
      }

      function renderStats(trivia) {
        var row = document.getElementById('stats-row');
        if (!trivia.games_played) {
          row.style.display = 'none';
          return;
        }
        row.style.display = '';
        var stats = [
          { value: trivia.games_played, label: 'Games Played' },
          { value: trivia.total_correct, label: 'Correct Answers' },
          { value: trivia.total_wrong, label: 'Wrong Answers' },
          { value: trivia.best_score, label: 'Best Score' },
          { value: trivia.accuracy + '%', label: 'Accuracy' },
        ];
        row.innerHTML = stats
          .map(function (s) {
            return (
              '<div class="col-6 col-md-4 col-lg-2"><div class="stat-card"><div class="stat-value">' +
              s.value +
              '</div><div class="stat-label">' +
              s.label +
              '</div></div></div>'
            );
          })
          .join('');
      }

      function renderAchievements(achievements, newlyUnlocked) {
        var section = document.getElementById('achievements-section');
        section.style.display = '';

        var unlocked = achievements.filter(function (a) {
          return a.unlocked;
        });
        var locked = achievements.filter(function (a) {
          return !a.unlocked;
        });
        var countEl = document.getElementById('ach-count');
        countEl.textContent = unlocked.length + ' / ' + achievements.length + ' unlocked';

        var grid = document.getElementById('achievements-grid');
        var html = '';

        // Unlocked first, then locked
        var sorted = unlocked.concat(locked);
        sorted.forEach(function (a) {
          var isNew = newlyUnlocked.indexOf(a.achievement_id) !== -1;
          var cls = a.unlocked ? 'unlocked' : 'locked';
          var dateHtml = '';
          if (a.unlocked && a.unlocked_at) {
            dateHtml =
              '<div class="ach-date">' +
              new Date(a.unlocked_at).toLocaleDateString(undefined, {
                day: 'numeric',
                month: 'short',
                year: 'numeric',
              }) +
              '</div>';
          }
          var newBadge = isNew ? '<span class="new-badge">NEW</span>' : '';

          html +=
            '<div class="col-6 col-md-4 col-lg-3">' +
            '<div class="achievement-card ' +
            cls +
            '">' +
            newBadge +
            '<div class="ach-icon"><i class="bi ' +
            a.icon +
            '"></i></div>' +
            '<div class="ach-name">' +
            escapeHtml(a.name) +
            '</div>' +
            '<div class="ach-desc">' +
            escapeHtml(a.description) +
            '</div>' +
            dateHtml +
            '</div></div>';
        });

        grid.innerHTML = html;
      }

      function escapeHtml(s) {
        var d = document.createElement('div');
        d.appendChild(document.createTextNode(s));
        return d.innerHTML;
      }

      loadProfile();
    </script>
  </body>
</html>
