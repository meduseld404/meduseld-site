<!doctype html>
<html lang="en">
  <head>
    <link rel="apple-touch-icon" sizes="180x180" href="https://meduseld.io/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1f14" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <meta charset="UTF-8" />
    <title>D&D Companion - Meduseld</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://meduseld.io/static/style.css" />
    <style>
      :root {
        --dnd-bg: #460365;
        --dnd-bg-light: #5a1a7a;
        --dnd-accent: #ffffff;
        --dnd-accent-dim: rgba(255, 255, 255, 0.7);
        --dnd-accent-glow: rgba(255, 255, 255, 0.2);
        --dnd-accent-subtle: rgba(255, 255, 255, 0.08);
      }
      .dnd-section {
        margin-bottom: 2rem;
      }
      /* Cards get purple background */
      .dnd-section .card,
      .session-card,
      .wiki-card,
      .link-card,
      .char-card {
        background: var(--dnd-bg) !important;
        border-color: rgba(255, 255, 255, 0.15) !important;
      }
      .link-card {
        cursor: pointer;
        transition:
          border-color 0.2s,
          transform 0.15s;
      }
      .link-card:hover {
        border-color: var(--dnd-accent) !important;
        transform: translateY(-2px);
      }
      .char-card {
        border-radius: 10px;
      }
      .char-card .char-avatar {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 2px solid var(--dnd-accent);
      }
      .char-card .char-portrait {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        border: 2px solid var(--dnd-accent);
        object-fit: cover;
        object-position: top;
      }
      .sound-btn {
        width: 100%;
        min-height: 70px;
        border-radius: 10px;
        transition: all 0.15s;
        position: relative;
        background: var(--dnd-bg-light) !important;
        border-color: rgba(255, 255, 255, 0.2) !important;
        color: #fff !important;
      }
      .sound-btn:hover {
        border-color: var(--dnd-accent) !important;
      }
      .sound-btn.playing {
        border-color: var(--dnd-accent) !important;
        box-shadow: 0 0 12px var(--dnd-accent-glow);
      }
      .sound-btn .sound-type-badge {
        position: absolute;
        top: 6px;
        right: 8px;
        font-size: 0.65rem;
      }
      .wiki-nav-btn {
        border-radius: 20px;
        font-size: 0.85rem;
      }
      .wiki-nav-btn.active {
        background: var(--dnd-accent) !important;
        color: var(--dnd-bg) !important;
        border-color: var(--dnd-accent) !important;
        font-weight: 600;
      }
      .session-card,
      .wiki-card {
        border-radius: 10px;
        transition: border-color 0.2s;
      }
      .session-card:hover,
      .wiki-card:hover {
        border-color: var(--dnd-accent) !important;
      }
      .tag-badge {
        font-size: 0.7rem;
        border-radius: 12px;
        padding: 2px 8px;
        background: var(--dnd-bg-light) !important;
      }
      .latest-pin {
        border: 2px solid var(--dnd-accent) !important;
        background: rgba(255, 255, 255, 0.05) !important;
      }
      .volume-slider {
        width: 80px;
        accent-color: #fff;
      }
      .master-volume {
        width: 120px;
        accent-color: #fff;
      }
      .search-input {
        background: var(--dnd-bg-light);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: #fff;
      }
      .search-input::placeholder {
        color: var(--dnd-accent-dim);
      }
      .search-input:focus {
        border-color: var(--dnd-accent);
        box-shadow: 0 0 0 0.2rem var(--dnd-accent-glow);
        color: #fff;
        background: var(--dnd-bg-light);
      }
      .tab-btn {
        border-radius: 8px 8px 0 0;
      }
      .tab-btn.active {
        background: var(--dnd-accent-subtle) !important;
        border-bottom: 2px solid var(--dnd-accent);
      }
      /* Override Bootstrap warning classes for this page */
      .btn-outline-warning {
        color: #fff !important;
        border-color: rgba(255, 255, 255, 0.5) !important;
      }
      .btn-outline-warning:hover {
        background: rgba(255, 255, 255, 0.15) !important;
        border-color: #fff !important;
        color: #fff !important;
      }
      .btn-warning {
        background: #fff !important;
        border-color: #fff !important;
        color: var(--dnd-bg) !important;
      }
      .btn-warning:hover {
        background: var(--dnd-accent-dim) !important;
        border-color: var(--dnd-accent-dim) !important;
        color: var(--dnd-bg) !important;
      }
      .border-warning {
        border-color: rgba(255, 255, 255, 0.2) !important;
      }
      .card-header {
        background: var(--dnd-bg-light) !important;
        border-bottom-color: rgba(255, 255, 255, 0.15) !important;
      }
      /* Modal overrides */
      .modal-content {
        background: var(--dnd-bg) !important;
        border-color: rgba(255, 255, 255, 0.2) !important;
      }
      .modal-header,
      .modal-footer {
        border-color: rgba(255, 255, 255, 0.1) !important;
      }
      .modal-content .form-control,
      .modal-content .form-select {
        background: var(--dnd-bg-light) !important;
        border-color: rgba(255, 255, 255, 0.2) !important;
        color: #fff !important;
      }
      .modal-title {
        color: #fff !important;
      }
    </style>
  </head>
  <body class="text-light" style="background: transparent">
    <!-- Header Navigation -->
    <div class="container-fluid pt-3 px-4">
      <div class="d-flex justify-content-between align-items-start">
        <a href="https://services.meduseld.io" class="btn btn-outline-warning">
          ← Back to Services
        </a>
        <div id="profile-container" style="display: none; position: relative"></div>
      </div>
    </div>

    <div class="container py-4">
      <div class="text-center mb-4">
        <img src="logo.png" alt="D&D Companion" style="max-height: 120px; margin-bottom: 10px" />
        <h1 style="color: #fff; font-weight: 600" class="mt-2">D&D Companion</h1>
        <p style="opacity: 0.8">Session hub, soundboard & campaign wiki</p>
      </div>

      <!-- Roll20 Campaign -->
      <div class="dnd-section">
        <a
          href="https://app.roll20.net/campaigns/details/20842428/the-beginning"
          target="_blank"
          class="text-decoration-none"
        >
          <div
            class="card border-0"
            style="
              background: var(--dnd-bg);
              border-radius: 12px;
              overflow: hidden;
              transition:
                transform 0.15s,
                box-shadow 0.15s;
              cursor: pointer;
            "
            onmouseover="
              this.style.transform = 'translateY(-3px)';
              this.style.boxShadow = '0 8px 24px rgba(0,0,0,0.3)';
            "
            onmouseout="
              this.style.transform = '';
              this.style.boxShadow = '';
            "
          >
            <img
              src="banner.png"
              alt="The Beginning"
              style="width: 100%; height: 180px; object-fit: cover; object-position: center"
            />
            <div class="p-3 text-center">
              <div class="fw-semibold text-white" style="font-size: 1.1rem">
                Open Roll20 Campaign
              </div>
              <div style="color: rgba(255, 255, 255, 0.6); font-size: 0.8rem">The Beginning</div>
            </div>
          </div>
        </a>
      </div>

      <!-- Party Roster -->
      <div class="dnd-section">
        <div class="card bg-dark border-warning">
          <div
            class="card-header d-flex justify-content-between align-items-center"
            style="
              background-color: rgba(255, 255, 255, 0.08);
              border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            "
          >
            <h5 class="mb-0" style="color: #fff">
              <i class="bi bi-people me-2"></i>
              Party Roster
            </h5>
            <button
              class="btn btn-sm btn-outline-warning"
              id="edit-char-btn"
              data-bs-toggle="modal"
              data-bs-target="#charModal"
            >
              <i class="bi bi-pencil me-1"></i>
              My Character
            </button>
          </div>
          <div class="card-body">
            <div id="roster-container" class="row g-3">
              <div class="text-center text-secondary py-3">
                <div class="spinner-border spinner-border-sm" role="status"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- DM Soundboard (admin only) -->
      <div class="dnd-section" id="soundboard-section" style="display: none">
        <div class="card bg-dark border-warning">
          <div
            class="card-header d-flex justify-content-between align-items-center"
            style="
              background-color: rgba(255, 255, 255, 0.08);
              border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            "
          >
            <h5 class="mb-0" style="color: #fff">
              <i class="bi bi-music-note-list me-2"></i>
              DM Soundboard
            </h5>
            <div class="d-flex align-items-center gap-3">
              <div class="d-flex align-items-center gap-2">
                <i class="bi bi-volume-up" style="color: #fff"></i>
                <input
                  type="range"
                  class="master-volume"
                  id="master-volume"
                  min="0"
                  max="100"
                  value="80"
                />
              </div>
              <button class="btn btn-sm btn-outline-warning" id="stop-all-btn">
                <i class="bi bi-stop-fill me-1"></i>
                Stop All
              </button>
              <button
                class="btn btn-sm btn-outline-warning"
                data-bs-toggle="modal"
                data-bs-target="#soundModal"
              >
                <i class="bi bi-plus-lg me-1"></i>
                Upload
              </button>
            </div>
          </div>
          <div class="card-body">
            <div id="sounds-container" class="row g-2">
              <div class="text-center text-secondary py-3">No sounds yet</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Campaign Wiki / Session Recaps -->
      <div class="dnd-section">
        <div class="card bg-dark border-warning">
          <div
            class="card-header"
            style="
              background-color: rgba(255, 255, 255, 0.08);
              border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            "
          >
            <div class="d-flex justify-content-between align-items-center mb-2">
              <h5 class="mb-0" style="color: #fff">
                <i class="bi bi-journal-text me-2"></i>
                Campaign Wiki
              </h5>
              <div class="d-flex gap-2">
                <div class="input-group input-group-sm" style="width: 220px">
                  <input
                    type="text"
                    class="form-control search-input"
                    id="wiki-search"
                    placeholder="Search..."
                  />
                  <button class="btn btn-outline-warning" id="wiki-search-btn">
                    <i class="bi bi-search"></i>
                  </button>
                </div>
                <button
                  class="btn btn-sm btn-outline-warning"
                  id="new-entry-btn"
                  data-bs-toggle="modal"
                  data-bs-target="#entryModal"
                >
                  <i class="bi bi-plus-lg me-1"></i>
                  New
                </button>
              </div>
            </div>
            <div class="d-flex gap-2 flex-wrap">
              <button class="btn btn-sm btn-outline-secondary tab-btn active" data-tab="sessions">
                Session Recaps
              </button>
              <button class="btn btn-sm btn-outline-secondary tab-btn" data-tab="wiki">
                Wiki Pages
              </button>
              <div
                class="ms-auto d-flex gap-1"
                id="wiki-category-filters"
                style="display: none !important"
              ></div>
            </div>
          </div>
          <div class="card-body">
            <div id="wiki-content">
              <div class="text-center text-secondary py-3">
                <div class="spinner-border spinner-border-sm" role="status"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Character Modal -->
    <div class="modal fade" id="charModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content bg-dark text-light border-warning">
          <div class="modal-header border-secondary">
            <h5 class="modal-title" style="color: #fff">My Character</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">Character Name</label>
              <input
                type="text"
                class="form-control bg-dark text-light border-secondary"
                id="char-name"
                required
              />
            </div>
            <div class="row g-3 mb-3">
              <div class="col">
                <label class="form-label">Race</label>
                <input
                  type="text"
                  class="form-control bg-dark text-light border-secondary"
                  id="char-race"
                />
              </div>
              <div class="col">
                <label class="form-label">Class</label>
                <input
                  type="text"
                  class="form-control bg-dark text-light border-secondary"
                  id="char-class"
                />
              </div>
              <div class="col-3">
                <label class="form-label">Level</label>
                <input
                  type="number"
                  class="form-control bg-dark text-light border-secondary"
                  id="char-level"
                  value="1"
                  min="1"
                  max="20"
                />
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">D&D Beyond Character URL</label>
              <input
                type="url"
                class="form-control bg-dark text-light border-secondary"
                id="char-beyond"
                placeholder="https://www.dndbeyond.com/characters/..."
              />
            </div>
          </div>
          <div class="modal-footer border-secondary">
            <button class="btn btn-warning text-dark" id="char-save-btn">Save</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Sound Upload Modal -->
    <div class="modal fade" id="soundModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content bg-dark text-light border-warning">
          <div class="modal-header border-secondary">
            <h5 class="modal-title" style="color: #fff">Upload Sound</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">Label</label>
              <input
                type="text"
                class="form-control bg-dark text-light border-secondary"
                id="sound-label"
                required
              />
            </div>
            <div class="row g-3 mb-3">
              <div class="col">
                <label class="form-label">Icon</label>
                <input
                  type="text"
                  class="form-control bg-dark text-light border-secondary"
                  id="sound-icon"
                  value="bi-music-note-beamed"
                />
              </div>
              <div class="col">
                <label class="form-label">Type</label>
                <select class="form-select bg-dark text-light border-secondary" id="sound-type">
                  <option value="sfx">SFX (plays once)</option>
                  <option value="ambient">Ambient (loops)</option>
                </select>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Audio File</label>
              <input
                type="file"
                class="form-control bg-dark text-light border-secondary"
                id="sound-file"
                accept="audio/*"
              />
            </div>
          </div>
          <div class="modal-footer border-secondary">
            <button class="btn btn-warning text-dark" id="sound-save-btn">Upload</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Entry Modal (Session Recap / Wiki Page) -->
    <div class="modal fade" id="entryModal" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content bg-dark text-light border-warning">
          <div class="modal-header border-secondary">
            <h5 class="modal-title" style="color: #fff" id="entryModalTitle">New Entry</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="entry-edit-id" />
            <input type="hidden" id="entry-edit-type" />
            <div class="mb-3">
              <label class="form-label">Type</label>
              <select class="form-select bg-dark text-light border-secondary" id="entry-type">
                <option value="session">Session Recap</option>
                <option value="wiki">Wiki Page</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">Title</label>
              <input
                type="text"
                class="form-control bg-dark text-light border-secondary"
                id="entry-title"
                required
              />
            </div>
            <div class="mb-3" id="entry-date-group">
              <label class="form-label">Session Date</label>
              <input
                type="date"
                class="form-control bg-dark text-light border-secondary"
                id="entry-date"
              />
            </div>
            <div class="mb-3" id="entry-category-group" style="display: none">
              <label class="form-label">Category</label>
              <select class="form-select bg-dark text-light border-secondary" id="entry-category">
                <option value="general">General</option>
                <option value="npcs">NPCs</option>
                <option value="locations">Locations</option>
                <option value="items">Items</option>
                <option value="factions">Factions</option>
                <option value="lore">Lore</option>
              </select>
            </div>
            <div class="mb-3" id="entry-tags-group">
              <label class="form-label">Tags (comma-separated)</label>
              <input
                type="text"
                class="form-control bg-dark text-light border-secondary"
                id="entry-tags"
                placeholder="combat, roleplay, boss fight"
              />
            </div>
            <div class="mb-3" id="entry-image-group" style="display: none">
              <label class="form-label">Image URL (optional)</label>
              <input
                type="url"
                class="form-control bg-dark text-light border-secondary"
                id="entry-image"
              />
            </div>
            <div class="mb-3">
              <label class="form-label">Content (Markdown supported)</label>
              <textarea
                class="form-control bg-dark text-light border-secondary"
                id="entry-body"
                rows="10"
                required
              ></textarea>
            </div>
          </div>
          <div class="modal-footer border-secondary">
            <button class="btn btn-warning text-dark" id="entry-save-btn">Save</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999">
      <div id="toast" class="toast align-items-center border-0" role="alert">
        <div class="d-flex">
          <div class="toast-body" id="toast-body"></div>
          <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"
          ></button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://meduseld.io/static/auth.js"></script>
    <script>
      const API = 'https://health.meduseld.io/check';
      let currentUser = null;
      let isAdmin = false;
      let activeTab = 'sessions';
      let audioPlayers = {}; // id -> Audio
      let masterVolume = 0.8;

      function getCfToken() {
        return (document.cookie.match(/(?:^|; )CF_Authorization=([^;]*)/) || [])[1] || '';
      }

      function showToast(msg, type) {
        const t = document.getElementById('toast');
        t.className = 'toast align-items-center border-0 text-bg-' + (type || 'warning');
        document.getElementById('toast-body').textContent = msg;
        bootstrap.Toast.getOrCreateInstance(t).show();
      }

      function renderMarkdown(text) {
        if (!text) return '';
        return text
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/\*(.+?)\*/g, '<em>$1</em>')
          .replace(/`(.+?)`/g, '<code>$1</code>')
          .replace(/^### (.+)$/gm, '<h5 class="mt-3" style="color:#fff">$1</h5>')
          .replace(/^## (.+)$/gm, '<h4 class="mt-3" style="color:#fff">$1</h4>')
          .replace(/^# (.+)$/gm, '<h3 class="mt-3" style="color:#fff">$1</h3>')
          .replace(/^- (.+)$/gm, '<li>$1</li>')
          .replace(/\n/g, '<br>');
      }

      // ===== LINKS =====
      // ===== PARTY ROSTER =====
      function getCharPortrait(characterName) {
        if (!characterName) return null;
        const firstName = characterName.trim().split(/\s+/)[0].toLowerCase();
        const portraits = [
          'draconis',
          'drayvn',
          'elennar',
          'finnan',
          'korrak',
          'thalmior',
          'tharok',
          'vael',
        ];
        if (portraits.includes(firstName)) return firstName + '.png';
        return null;
      }

      async function loadRoster() {
        try {
          const r = await fetch(API + '/dnd-characters');
          const d = await r.json();
          const c = document.getElementById('roster-container');
          if (!d.characters || !d.characters.length) {
            c.innerHTML =
              '<div class="text-center text-secondary py-3">No characters yet. Click "My Character" to add yours.</div>';
            return;
          }
          c.innerHTML = d.characters
            .map((ch) => {
              const portrait = getCharPortrait(ch.character_name);
              const avatarHtml = portrait
                ? '<img src="' + portrait + '" class="char-portrait" alt="">'
                : '<img src="' +
                  (ch.avatar_url || 'https://cdn.discordapp.com/embed/avatars/0.png') +
                  '" class="char-avatar" alt="">';
              return `
            <div class="col-6 col-md-4 col-lg-3">
              <div class="card bg-dark border-secondary char-card h-100 p-3 text-center">
                <div class="d-flex justify-content-center mb-2">
                  ${avatarHtml}
                </div>
                <div class="fw-semibold" style="color:#fff">${ch.character_name}</div>
                <div class="text-secondary" style="font-size:0.8rem">${ch.display_name || ''}</div>
                <div class="mt-1" style="font-size:0.85rem">${ch.race || '?'} ${ch.class_name || '?'} · Lv ${ch.level || 1}</div>
                ${ch.beyond_url ? '<a href="' + ch.beyond_url + '" target="_blank" class="btn btn-sm btn-outline-warning mt-2">View Sheet</a>' : ''}
                ${isAdmin || (currentUser && currentUser.db_id === ch.user_id) ? '<button class="btn btn-sm btn-outline-danger mt-1" onclick="deleteCharacter(' + ch.id + ')"><i class="bi bi-trash"></i></button>' : ''}
              </div>
            </div>`;
            })
            .join('');
        } catch (e) {
          console.error('Failed to load roster:', e);
        }
      }

      async function saveCharacter() {
        const body = {
          character_name: document.getElementById('char-name').value,
          race: document.getElementById('char-race').value,
          class_name: document.getElementById('char-class').value,
          level: parseInt(document.getElementById('char-level').value) || 1,
          beyond_url: document.getElementById('char-beyond').value,
          _cf_token: getCfToken(),
        };
        try {
          const r = await fetch(API + '/dnd-characters', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          if (!r.ok) {
            const e = await r.json();
            showToast(e.error || 'Failed', 'danger');
            return;
          }
          bootstrap.Modal.getInstance(document.getElementById('charModal')).hide();
          loadRoster();
          showToast('Character saved');
        } catch (e) {
          console.error('Failed to save character:', e);
          showToast('Save failed', 'danger');
        }
      }

      async function deleteCharacter(id) {
        if (!confirm('Delete this character?')) return;
        try {
          await fetch(API + '/dnd-characters-' + id + '?cf_token=' + getCfToken(), {
            method: 'DELETE',
          });
          loadRoster();
          showToast('Character deleted');
        } catch (e) {
          console.error('Failed to delete character:', e);
          showToast('Delete failed', 'danger');
        }
      }

      // Pre-fill character modal with existing data
      async function prefillCharacter() {
        try {
          const r = await fetch(API + '/dnd-characters');
          const d = await r.json();
          if (!d.characters || !currentUser) return;
          const mine = d.characters.find((c) => c.user_id === currentUser.db_id);
          if (mine) {
            document.getElementById('char-name').value = mine.character_name || '';
            document.getElementById('char-race').value = mine.race || '';
            document.getElementById('char-class').value = mine.class_name || '';
            document.getElementById('char-level').value = mine.level || 1;
            document.getElementById('char-beyond').value = mine.beyond_url || '';
          }
        } catch (e) {
          console.error('Failed to prefill character:', e);
        }
      }

      // ===== SOUNDBOARD =====
      async function loadSounds() {
        try {
          const r = await fetch(API + '/dnd-sounds');
          const d = await r.json();
          const c = document.getElementById('sounds-container');
          if (!d.sounds || !d.sounds.length) {
            c.innerHTML =
              '<div class="text-center text-secondary py-3">No sounds yet. Click Upload to add one.</div>';
            return;
          }
          c.innerHTML = d.sounds
            .map(
              (s) => `
            <div class="col-4 col-md-3 col-lg-2">
              <button class="btn btn-outline-secondary sound-btn" data-id="${s.id}" data-url="${s.audio_url}" data-type="${s.sound_type}" onclick="toggleSound(${s.id}, '${s.audio_url}', '${s.sound_type}')">
                <span class="sound-type-badge badge ${s.sound_type === 'ambient' ? 'bg-info' : 'bg-secondary'}">${s.sound_type}</span>
                <i class="bi ${s.icon}" style="font-size:1.5rem"></i>
                <div style="font-size:0.8rem" class="mt-1">${s.label}</div>
                <div class="d-flex align-items-center justify-content-center mt-1">
                  <input type="range" class="volume-slider" min="0" max="100" value="80" onclick="event.stopPropagation()" oninput="event.stopPropagation();setSoundVolume(${s.id}, this.value)">
                </div>
              </button>
              <button class="btn btn-sm btn-outline-danger w-100 mt-1" onclick="deleteSound(${s.id})"><i class="bi bi-trash"></i></button>
            </div>`
            )
            .join('');
        } catch (e) {
          console.error('Failed to load sounds:', e);
        }
      }

      function toggleSound(id, url, type) {
        if (audioPlayers[id]) {
          audioPlayers[id].pause();
          audioPlayers[id] = null;
          const btn = document.querySelector('[data-id="' + id + '"]');
          if (btn) btn.classList.remove('playing');
          return;
        }
        const audio = new Audio(url);
        audio.volume = masterVolume * 0.8;
        audio.loop = type === 'ambient';
        audio.play().catch((e) => console.error('Audio play failed:', e));
        audioPlayers[id] = audio;
        const btn = document.querySelector('[data-id="' + id + '"]');
        if (btn) btn.classList.add('playing');
        audio.addEventListener('ended', () => {
          if (!audio.loop) {
            audioPlayers[id] = null;
            if (btn) btn.classList.remove('playing');
          }
        });
      }

      function setSoundVolume(id, val) {
        if (audioPlayers[id]) audioPlayers[id].volume = masterVolume * (val / 100);
      }

      function stopAllSounds() {
        Object.keys(audioPlayers).forEach((id) => {
          if (audioPlayers[id]) {
            audioPlayers[id].pause();
            audioPlayers[id] = null;
          }
          const btn = document.querySelector('[data-id="' + id + '"]');
          if (btn) btn.classList.remove('playing');
        });
      }

      async function uploadSound() {
        const label = document.getElementById('sound-label').value.trim();
        const file = document.getElementById('sound-file').files[0];
        if (!label || !file) {
          showToast('Label and file required', 'danger');
          return;
        }
        const fd = new FormData();
        fd.append('label', label);
        fd.append('icon', document.getElementById('sound-icon').value.trim());
        fd.append('sound_type', document.getElementById('sound-type').value);
        fd.append('file', file);
        fd.append('_cf_token', getCfToken());
        try {
          const r = await fetch(API + '/dnd-sounds', { method: 'POST', body: fd });
          if (!r.ok) {
            const e = await r.json();
            showToast(e.error || 'Upload failed', 'danger');
            return;
          }
          bootstrap.Modal.getInstance(document.getElementById('soundModal')).hide();
          loadSounds();
          showToast('Sound uploaded');
        } catch (e) {
          console.error('Failed to upload sound:', e);
          showToast('Upload failed', 'danger');
        }
      }

      async function deleteSound(id) {
        if (!confirm('Delete this sound?')) return;
        if (audioPlayers[id]) {
          audioPlayers[id].pause();
          audioPlayers[id] = null;
        }
        try {
          await fetch(API + '/dnd-sounds-' + id + '?cf_token=' + getCfToken(), {
            method: 'DELETE',
          });
          loadSounds();
          showToast('Sound deleted');
        } catch (e) {
          console.error('Failed to delete sound:', e);
          showToast('Delete failed', 'danger');
        }
      }

      // ===== WIKI / SESSIONS =====
      async function loadContent() {
        const c = document.getElementById('wiki-content');
        const catFilters = document.getElementById('wiki-category-filters');
        if (activeTab === 'sessions') {
          catFilters.style.display = 'none';
          try {
            const r = await fetch(API + '/dnd-sessions');
            const d = await r.json();
            if (!d.sessions || !d.sessions.length) {
              c.innerHTML =
                '<div class="text-center text-secondary py-4">No session recaps yet. Click "New" to write the first one.</div>';
              return;
            }
            c.innerHTML = d.sessions
              .map(
                (s, i) => `
              <div class="card bg-dark border-secondary session-card mb-3 ${i === 0 ? 'latest-pin' : ''}">
                <div class="card-body">
                  <div class="d-flex justify-content-between align-items-start">
                    <div>
                      ${i === 0 ? '<span class="badge bg-warning text-dark me-2" style="font-size:0.7rem">LATEST</span>' : ''}
                      <span class="fw-semibold" style="color:#fff;font-size:1.1rem">${s.title}</span>
                      <span class="text-secondary ms-2" style="font-size:0.8rem">${s.session_date || ''}</span>
                    </div>
                    <div class="d-flex gap-1">
                      <button class="btn btn-sm btn-outline-secondary" onclick="editEntry('session',${s.id})"><i class="bi bi-pencil"></i></button>
                      ${isAdmin ? '<button class="btn btn-sm btn-outline-danger" onclick="deleteEntry(\'session\',' + s.id + ')"><i class="bi bi-trash"></i></button>' : ''}
                    </div>
                  </div>
                  ${
                    s.tags
                      ? '<div class="mt-1">' +
                        s.tags
                          .split(',')
                          .map(
                            (t) =>
                              '<span class="badge bg-secondary tag-badge me-1">' +
                              t.trim() +
                              '</span>'
                          )
                          .join('') +
                        '</div>'
                      : ''
                  }
                  <div class="mt-2" style="font-size:0.9rem">${renderMarkdown(s.body)}</div>
                  <div class="mt-2 text-secondary" style="font-size:0.75rem">
                    <img src="${s.author_avatar || 'https://cdn.discordapp.com/embed/avatars/0.png'}" style="width:18px;height:18px;border-radius:50%" class="me-1">
                    ${s.author_name || 'Unknown'}
                  </div>
                </div>
              </div>`
              )
              .join('');
          } catch (e) {
            console.error('Failed to load sessions:', e);
            c.innerHTML = '<div class="text-center text-danger py-3">Failed to load sessions</div>';
          }
        } else {
          catFilters.style.display = 'flex';
          const cat = document.querySelector('.wiki-cat-btn.active');
          const catVal = cat ? cat.dataset.cat : '';
          try {
            const url = API + '/dnd-wiki' + (catVal ? '?category=' + catVal : '');
            const r = await fetch(url);
            const d = await r.json();
            if (!d.pages || !d.pages.length) {
              c.innerHTML =
                '<div class="text-center text-secondary py-4">No wiki pages yet. Click "New" to create one.</div>';
              return;
            }
            c.innerHTML = d.pages
              .map(
                (p) => `
              <div class="card bg-dark border-secondary wiki-card mb-3">
                <div class="card-body">
                  <div class="d-flex justify-content-between align-items-start">
                    <div>
                      <span class="badge bg-secondary tag-badge me-2">${p.category}</span>
                      <span class="fw-semibold" style="color:#fff;font-size:1.1rem">${p.title}</span>
                    </div>
                    <div class="d-flex gap-1">
                      <button class="btn btn-sm btn-outline-secondary" onclick="editEntry('wiki',${p.id})"><i class="bi bi-pencil"></i></button>
                      ${isAdmin ? '<button class="btn btn-sm btn-outline-danger" onclick="deleteEntry(\'wiki\',' + p.id + ')"><i class="bi bi-trash"></i></button>' : ''}
                    </div>
                  </div>
                  ${p.image_url ? '<img src="' + p.image_url + '" class="mt-2 rounded" style="max-height:200px">' : ''}
                  <div class="mt-2" style="font-size:0.9rem">${renderMarkdown(p.body)}</div>
                  <div class="mt-2 text-secondary" style="font-size:0.75rem">
                    <img src="${p.author_avatar || 'https://cdn.discordapp.com/embed/avatars/0.png'}" style="width:18px;height:18px;border-radius:50%" class="me-1">
                    ${p.author_name || 'Unknown'} · ${p.updated_at ? new Date(p.updated_at).toLocaleDateString() : ''}
                  </div>
                </div>
              </div>`
              )
              .join('');
          } catch (e) {
            console.error('Failed to load wiki:', e);
            c.innerHTML =
              '<div class="text-center text-danger py-3">Failed to load wiki pages</div>';
          }
        }
      }

      async function editEntry(type, id) {
        const endpoint = type === 'session' ? 'dnd-sessions' : 'dnd-wiki';
        try {
          const r = await fetch(API + '/' + endpoint);
          const d = await r.json();
          const items = type === 'session' ? d.sessions : d.pages;
          const item = items.find((i) => i.id === id);
          if (!item) return;
          document.getElementById('entry-edit-id').value = id;
          document.getElementById('entry-edit-type').value = type;
          document.getElementById('entry-type').value = type;
          document.getElementById('entry-type').disabled = true;
          document.getElementById('entry-title').value = item.title;
          document.getElementById('entry-body').value = item.body;
          if (type === 'session') {
            document.getElementById('entry-date').value = item.session_date || '';
            document.getElementById('entry-tags').value = item.tags || '';
            document.getElementById('entry-date-group').style.display = '';
            document.getElementById('entry-tags-group').style.display = '';
            document.getElementById('entry-category-group').style.display = 'none';
            document.getElementById('entry-image-group').style.display = 'none';
          } else {
            document.getElementById('entry-category').value = item.category || 'general';
            document.getElementById('entry-image').value = item.image_url || '';
            document.getElementById('entry-date-group').style.display = 'none';
            document.getElementById('entry-tags-group').style.display = 'none';
            document.getElementById('entry-category-group').style.display = '';
            document.getElementById('entry-image-group').style.display = '';
          }
          document.getElementById('entryModalTitle').textContent =
            'Edit ' + (type === 'session' ? 'Session Recap' : 'Wiki Page');
          bootstrap.Modal.getOrCreateInstance(document.getElementById('entryModal')).show();
        } catch (e) {
          console.error('Failed to load entry for edit:', e);
        }
      }

      async function saveEntry() {
        const editId = document.getElementById('entry-edit-id').value;
        const type =
          document.getElementById('entry-edit-type').value ||
          document.getElementById('entry-type').value;
        const title = document.getElementById('entry-title').value.trim();
        const body = document.getElementById('entry-body').value;
        if (!title || !body) {
          showToast('Title and content required', 'danger');
          return;
        }

        let payload = { title, body, _cf_token: getCfToken() };
        let endpoint;
        if (type === 'session') {
          payload.session_date = document.getElementById('entry-date').value;
          payload.tags = document.getElementById('entry-tags').value;
          if (!payload.session_date) {
            showToast('Session date required', 'danger');
            return;
          }
          endpoint = editId ? 'dnd-sessions-' + editId : 'dnd-sessions';
        } else {
          payload.category = document.getElementById('entry-category').value;
          payload.image_url = document.getElementById('entry-image').value;
          endpoint = editId ? 'dnd-wiki-' + editId : 'dnd-wiki';
        }
        try {
          const r = await fetch(API + '/' + endpoint, {
            method: editId ? 'PUT' : 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          if (!r.ok) {
            const e = await r.json();
            showToast(e.error || 'Failed', 'danger');
            return;
          }
          bootstrap.Modal.getInstance(document.getElementById('entryModal')).hide();
          loadContent();
          showToast(editId ? 'Updated' : 'Created');
        } catch (e) {
          console.error('Failed to save entry:', e);
          showToast('Save failed', 'danger');
        }
      }

      async function deleteEntry(type, id) {
        if (!confirm('Delete this ' + (type === 'session' ? 'session recap' : 'wiki page') + '?'))
          return;
        const endpoint = type === 'session' ? 'dnd-sessions-' : 'dnd-wiki-';
        try {
          await fetch(API + '/' + endpoint + id + '?cf_token=' + getCfToken(), {
            method: 'DELETE',
          });
          loadContent();
          showToast('Deleted');
        } catch (e) {
          console.error('Failed to delete entry:', e);
          showToast('Delete failed', 'danger');
        }
      }

      // ===== SEARCH =====
      async function doSearch() {
        const q = document.getElementById('wiki-search').value.trim();
        if (!q) {
          loadContent();
          return;
        }
        try {
          const r = await fetch(API + '/dnd-search?q=' + encodeURIComponent(q));
          const d = await r.json();
          const c = document.getElementById('wiki-content');
          if (!d.results || !d.results.length) {
            c.innerHTML =
              '<div class="text-center text-secondary py-4">No results for "' + q + '"</div>';
            return;
          }
          c.innerHTML = d.results
            .map(
              (item) => `
            <div class="card bg-dark border-secondary mb-3">
              <div class="card-body">
                <span class="badge ${item.type === 'session' ? 'bg-warning text-dark' : 'bg-info'} me-2">${item.type === 'session' ? 'Session' : 'Wiki'}</span>
                <span class="fw-semibold" style="color:#fff">${item.title}</span>
                ${item.category ? '<span class="badge bg-secondary tag-badge ms-2">' + item.category + '</span>' : ''}
                ${item.tags ? '<span class="text-secondary ms-2" style="font-size:0.75rem">' + item.tags + '</span>' : ''}
                <div class="mt-2 text-secondary" style="font-size:0.85rem">${(item.body || '').substring(0, 200)}...</div>
              </div>
            </div>`
            )
            .join('');
        } catch (e) {
          console.error('Search failed:', e);
        }
      }

      // ===== INIT =====
      function setupEntryTypeToggle() {
        const sel = document.getElementById('entry-type');
        sel.addEventListener('change', () => {
          const isSession = sel.value === 'session';
          document.getElementById('entry-date-group').style.display = isSession ? '' : 'none';
          document.getElementById('entry-tags-group').style.display = isSession ? '' : 'none';
          document.getElementById('entry-category-group').style.display = isSession ? 'none' : '';
          document.getElementById('entry-image-group').style.display = isSession ? 'none' : '';
        });
      }

      function setupTabs() {
        document.querySelectorAll('.tab-btn').forEach((btn) => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach((b) => b.classList.remove('active'));
            btn.classList.add('active');
            activeTab = btn.dataset.tab;
            loadContent();
          });
        });
      }

      function setupCategoryFilters() {
        const cats = ['', 'general', 'npcs', 'locations', 'items', 'factions', 'lore'];
        const labels = ['All', 'General', 'NPCs', 'Locations', 'Items', 'Factions', 'Lore'];
        const container = document.getElementById('wiki-category-filters');
        container.innerHTML = cats
          .map(
            (c, i) =>
              `<button class="btn btn-sm wiki-nav-btn wiki-cat-btn ${i === 0 ? 'active' : ''} btn-outline-secondary" data-cat="${c}">${labels[i]}</button>`
          )
          .join('');
        container.querySelectorAll('.wiki-cat-btn').forEach((btn) => {
          btn.addEventListener('click', () => {
            container
              .querySelectorAll('.wiki-cat-btn')
              .forEach((b) => b.classList.remove('active'));
            btn.classList.add('active');
            loadContent();
          });
        });
      }

      function resetEntryModal() {
        document.getElementById('entry-edit-id').value = '';
        document.getElementById('entry-edit-type').value = '';
        document.getElementById('entry-type').disabled = false;
        document.getElementById('entry-title').value = '';
        document.getElementById('entry-body').value = '';
        document.getElementById('entry-date').value = '';
        document.getElementById('entry-tags').value = '';
        document.getElementById('entry-category').value = 'general';
        document.getElementById('entry-image').value = '';
        document.getElementById('entryModalTitle').textContent = 'New Entry';
        // Set type based on active tab
        document.getElementById('entry-type').value = activeTab === 'wiki' ? 'wiki' : 'session';
        document.getElementById('entry-type').dispatchEvent(new Event('change'));
      }

      document.addEventListener('DOMContentLoaded', async () => {
        MeduseldAuth.requireAuth();
        MeduseldAuth.renderProfile('profile-container');
        MeduseldAuth.syncUser();

        const user = MeduseldAuth.getUser();
        if (user) {
          currentUser = user;
          isAdmin = MeduseldAuth.hasRole('admin');
        }

        // Get DB user ID for character matching
        try {
          const meResp = await fetch('https://panel.meduseld.io/api/me', {
            credentials: 'include',
            redirect: 'manual',
          });
          if (meResp.ok) {
            const meData = await meResp.json();
            if (meData.authenticated && meData.user) currentUser.db_id = meData.user.id;
          }
        } catch (e) {
          console.error('Failed to get DB user ID:', e);
        }

        // Show admin-only elements
        if (isAdmin) {
          document.getElementById('soundboard-section').style.display = '';
          loadSounds();
        }

        // Event listeners
        document.getElementById('char-save-btn').addEventListener('click', saveCharacter);
        document.getElementById('sound-save-btn').addEventListener('click', uploadSound);
        document.getElementById('entry-save-btn').addEventListener('click', saveEntry);
        document.getElementById('stop-all-btn').addEventListener('click', stopAllSounds);
        document.getElementById('master-volume').addEventListener('input', (e) => {
          masterVolume = e.target.value / 100;
          Object.values(audioPlayers).forEach((a) => {
            if (a) a.volume = masterVolume * 0.8;
          });
        });
        document.getElementById('wiki-search-btn').addEventListener('click', doSearch);
        document.getElementById('wiki-search').addEventListener('keydown', (e) => {
          if (e.key === 'Enter') doSearch();
        });

        // Reset entry modal on open
        document.getElementById('entryModal').addEventListener('show.bs.modal', (e) => {
          if (!document.getElementById('entry-edit-id').value) resetEntryModal();
        });
        document.getElementById('entryModal').addEventListener('hidden.bs.modal', resetEntryModal);

        // Pre-fill character modal
        document.getElementById('charModal').addEventListener('show.bs.modal', prefillCharacter);

        setupEntryTypeToggle();
        setupTabs();
        setupCategoryFilters();

        // Load data
        loadRoster();
        loadContent();
      });
    </script>
  </body>
</html>
