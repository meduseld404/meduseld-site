<!doctype html>
<html lang="en">
  <head>
    <link rel="apple-touch-icon" sizes="180x180" href="https://meduseld.io/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1f14" />
    <link rel="icon" type="image/x-icon" href="https://meduseld.io/static/favicon.ico" />
    <meta charset="UTF-8" />
    <title>Meduseld - Hall of Fame</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://meduseld.io/static/style.css" />
    <style>
      .fame-card {
        background: rgba(20, 36, 26, 0.85);
        border: 1px solid rgba(108, 117, 125, 0.3);
        border-radius: 12px;
        overflow: hidden;
        transition: border-color 0.2s;
      }
      .fame-card:hover {
        border-color: rgba(230, 198, 92, 0.5);
      }
      .fame-card img,
      .fame-card video {
        width: 100%;
        max-height: 300px;
        object-fit: cover;
        cursor: pointer;
        background: #000;
      }
      .fame-card .fame-body {
        padding: 0.75rem 1rem;
      }
      .fame-card .fame-title {
        color: #e4d9b5;
        font-weight: 600;
        font-size: 0.95rem;
        margin-bottom: 0.25rem;
      }
      .fame-card .fame-caption {
        color: #a0a0b8;
        font-size: 0.8rem;
        margin-bottom: 0.5rem;
      }
      .fame-card .fame-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 0.75rem;
        color: #6c757d;
      }
      .fame-card .fame-user {
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }
      .fame-card .fame-user img {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        object-fit: cover;
        max-height: none;
        cursor: default;
      }
      .vote-btn {
        background: none;
        border: 1px solid rgba(108, 117, 125, 0.4);
        border-radius: 6px;
        padding: 0.2rem 0.6rem;
        color: #a0a0b8;
        font-size: 0.8rem;
        cursor: pointer;
        transition: all 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
      }
      .vote-btn:hover {
        border-color: #e6c65c;
        color: #e6c65c;
      }
      .vote-btn.voted {
        background: rgba(230, 198, 92, 0.15);
        border-color: #e6c65c;
        color: #e6c65c;
      }
      .filter-bar {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        margin-bottom: 1.5rem;
      }
      .filter-btn {
        background: rgba(20, 36, 26, 0.85);
        border: 1px solid rgba(108, 117, 125, 0.3);
        border-radius: 20px;
        padding: 0.3rem 0.9rem;
        color: #a0a0b8;
        font-size: 0.8rem;
        cursor: pointer;
        transition: all 0.2s;
      }
      .filter-btn:hover {
        border-color: #e6c65c;
        color: #e6c65c;
      }
      .filter-btn.active {
        background: rgba(230, 198, 92, 0.15);
        border-color: #e6c65c;
        color: #e6c65c;
      }
      .fame-embed {
        position: relative;
        padding-bottom: 56.25%;
        height: 0;
        overflow: hidden;
      }
      .fame-embed iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: 0;
        border-radius: 12px 12px 0 0;
      }
      .delete-btn {
        position: absolute;
        top: 0.5rem;
        right: 0.5rem;
        background: rgba(220, 53, 69, 0.85);
        border: none;
        border-radius: 50%;
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 0.75rem;
        cursor: pointer;
        opacity: 0;
        transition: opacity 0.2s;
        z-index: 2;
      }
      .fame-card:hover .delete-btn {
        opacity: 1;
      }
      .tag-badge {
        display: inline-block;
        background: rgba(230, 198, 92, 0.12);
        border: 1px solid rgba(230, 198, 92, 0.3);
        border-radius: 10px;
        padding: 0.1rem 0.5rem;
        font-size: 0.7rem;
        color: #e6c65c;
        margin-right: 0.3rem;
      }
      .tag-filter-row {
        display: flex;
        gap: 0.4rem;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        margin-bottom: 1rem;
      }
      .tag-input-wrap { position: relative; }
      .tag-dropdown {
        position: absolute;
        bottom: 100%;
        left: 0;
        right: 0;
        max-height: 180px;
        overflow-y: auto;
        background: #1a2e22;
        border: 1px solid rgba(108, 117, 125, 0.5);
        border-radius: 6px;
        z-index: 10;
        display: none;
        margin-bottom: 2px;
      }
      .tag-dropdown.show { display: block; }
      .tag-dropdown-item {
        padding: 0.4rem 0.75rem;
        color: #e4d9b5;
        font-size: 0.85rem;
        cursor: pointer;
      }
      .tag-dropdown-item:hover,
      .tag-dropdown-item.active {
        background: rgba(230, 198, 92, 0.15);
        color: #e6c65c;
      }
      .lightbox-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.9);
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .lightbox-overlay img,
      .lightbox-overlay video {
        max-width: 95vw;
        max-height: 90vh;
        object-fit: contain;
        border-radius: 8px;
      }
    </style>
  </head>
  <body class="text-light" style="background: transparent">
    <div class="container-fluid pt-3">
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
        <a href="https://services.meduseld.io" class="btn btn-warning btn-sm">
          <i class="bi bi-arrow-left"></i>
          Back to Services
        </a>
        <div id="profile-container" style="display: none; position: relative"></div>
      </div>
    </div>

    <div class="container py-4">
      <h2 class="text-center mb-2" style="color: #e6c65c">
        Hall of Fame
      </h2>
      <p class="text-center text-muted mb-4">Funny moments, clips, and memorable screenshots</p>

      <!-- Controls -->
      <div class="text-center mb-3">
        <button class="btn btn-warning btn-sm" onclick="openSubmitModal()">
          <i class="bi bi-plus-lg me-1"></i>
          Submit Entry
        </button>
      </div>

      <div class="filter-bar">
        <button class="filter-btn active" data-filter="" onclick="setFilter(this, '')">All</button>
        <button class="filter-btn" data-filter="image" onclick="setFilter(this, 'image')">
          <i class="bi bi-image me-1"></i>
          Screenshots
        </button>
        <button class="filter-btn" data-filter="video" onclick="setFilter(this, 'video')">
          <i class="bi bi-camera-video me-1"></i>
          Clips
        </button>
        <span class="mx-2 text-muted">|</span>
        <button class="filter-btn active" data-sort="votes" onclick="setSort(this, 'votes')">
          <i class="bi bi-trophy me-1"></i>
          Top Rated
        </button>
        <button class="filter-btn" data-sort="newest" onclick="setSort(this, 'newest')">
          <i class="bi bi-clock me-1"></i>
          Newest
        </button>
        <button class="filter-btn" data-sort="oldest" onclick="setSort(this, 'oldest')">
          Oldest
        </button>
      </div>

      <!-- Tag filter -->
      <div class="tag-filter-row" id="tag-filter-row">
        <button class="filter-btn active" data-tag="" onclick="setTag(this, '')">All Games</button>
      </div>

      <!-- Gallery -->
      <div id="gallery" class="row g-3"></div>
      <div id="loading" class="text-center py-4" style="display: none">
        <div class="spinner-border text-warning" role="status"></div>
      </div>
      <div id="empty-state" class="text-center py-5" style="display: none">
        <i class="bi bi-star" style="font-size: 3rem; color: #6c757d"></i>
        <p class="text-muted mt-2">No entries yet. Be the first to submit!</p>
      </div>
      <div class="text-center mt-3">
        <button
          id="load-more-btn"
          class="btn btn-outline-warning btn-sm"
          style="display: none"
          onclick="loadMore()"
        >
          Load More
        </button>
      </div>
    </div>
  </body>
</html>

<!-- Submit Modal -->
<div class="modal fade" id="submitModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-light border-warning">
      <div class="modal-header border-secondary">
        <h5 class="modal-title" style="color: #e6c65c">Submit to Hall of Fame</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <!-- Tab toggle -->
        <div class="d-flex gap-2 mb-3">
          <button class="filter-btn active" id="tab-upload" onclick="switchTab('upload')">
            <i class="bi bi-upload me-1"></i>
            Upload File
          </button>
          <button class="filter-btn" id="tab-link" onclick="switchTab('link')">
            <i class="bi bi-link-45deg me-1"></i>
            Paste Link
          </button>
        </div>
        <!-- Upload form -->
        <div id="form-upload">
          <div class="mb-3">
            <label class="form-label small text-muted">Title</label>
            <input
              type="text"
              class="form-control bg-dark text-light border-secondary"
              id="upload-title"
              maxlength="256"
              placeholder="What happened here?"
            />
          </div>
          <div class="mb-3">
            <label class="form-label small text-muted">Caption (optional)</label>
            <input
              type="text"
              class="form-control bg-dark text-light border-secondary"
              id="upload-caption"
              maxlength="500"
              placeholder="Add some context..."
            />
          </div>
          <div class="mb-3">
            <label class="form-label small text-muted">Game Tag</label>
            <div class="tag-input-wrap">
              <div class="tag-dropdown" id="upload-tag-dropdown"></div>
              <input
                type="text"
                class="form-control bg-dark text-light border-secondary"
                id="upload-tag"
                maxlength="64"
                placeholder="Select or type a game..."
                autocomplete="off"
              />
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label small text-muted">
              File (images and videos up to 250MB)
            </label>
            <input
              type="file"
              class="form-control bg-dark text-light border-secondary"
              id="upload-file"
              accept="image/jpeg,image/png,image/gif,image/webp,video/mp4,video/webm"
            />
          </div>
          <div id="upload-preview" class="mb-3" style="display: none"></div>
        </div>
        <!-- Link form -->
        <div id="form-link" style="display: none">
          <div class="mb-3">
            <label class="form-label small text-muted">Title</label>
            <input
              type="text"
              class="form-control bg-dark text-light border-secondary"
              id="link-title"
              maxlength="256"
              placeholder="What happened here?"
            />
          </div>
          <div class="mb-3">
            <label class="form-label small text-muted">Caption (optional)</label>
            <input
              type="text"
              class="form-control bg-dark text-light border-secondary"
              id="link-caption"
              maxlength="500"
              placeholder="Add some context..."
            />
          </div>
          <div class="mb-3">
            <label class="form-label small text-muted">Game Tag</label>
            <div class="tag-input-wrap">
              <div class="tag-dropdown" id="link-tag-dropdown"></div>
              <input
                type="text"
                class="form-control bg-dark text-light border-secondary"
                id="link-tag"
                maxlength="64"
                placeholder="Select or type a game..."
                autocomplete="off"
              />
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label small text-muted">
              URL (YouTube, Imgur, direct image/video link)
            </label>
            <input
              type="url"
              class="form-control bg-dark text-light border-secondary"
              id="link-url"
              placeholder="https://..."
            />
          </div>
          <div class="mb-3">
            <label class="form-label small text-muted">Type</label>
            <select class="form-select bg-dark text-light border-secondary" id="link-type">
              <option value="video">Video / Clip</option>
              <option value="image">Screenshot / Image</option>
            </select>
          </div>
        </div>
        <div id="submit-error" class="text-danger small mb-2" style="display: none"></div>
      </div>
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">
          Cancel
        </button>
        <button
          type="button"
          class="btn btn-warning btn-sm"
          id="submit-btn"
          onclick="submitEntry()"
        >
          <i class="bi bi-send me-1"></i>
          Submit
        </button>
      </div>
    </div>
  </div>
</div>

    <a href="https://quietarca.de" target="_blank" class="text-warning text-decoration-none">
      quietarcade
    </a>
    ~ All rights reserved.
  </p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://meduseld.io/static/auth.js"></script>
    <script>
    (function() {
      var HEALTH_BASE = 'https://health.meduseld.io/check';
      var currentFilter = '';
      var currentSort = 'votes';
      var currentTag = '';
      var currentPage = 1;
      var totalEntries = 0;
      var perPage = 20;
      var currentUser = null;
      var submitModal = null;
      var DEFAULT_TAGS = ['PEAK', 'R.E.P.O.', 'RV There Yet?', 'Icarus', 'Battlefield 6', 'YAPYAP'];
      var allTags = [];

      document.getElementById('copyright-year').textContent = new Date().getFullYear();

      if (typeof MeduseldAuth !== 'undefined') {
        if (!MeduseldAuth.requireAuth()) return; // Redirect to login if no cookie
        MeduseldAuth.renderProfile('profile-container');
        MeduseldAuth.syncUser().then(function () {
          MeduseldAuth.renderProfile('profile-container');
        });
      }

      function getCfToken() {
        return (document.cookie.match(/(?:^|; )CF_Authorization=([^;]*)/) || [])[1] || '';
      }

      function escapeHtml(str) {
        if (!str) return '';
        var d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
      }

      // Detect current user from auth
      try {
        if (typeof MeduseldAuth !== 'undefined') {
          var u = MeduseldAuth.getUser();
          if (u) currentUser = u;
        }
      } catch (e) {
        console.error('Failed to get current user:', e);
      }

      function loadEntries(append) {
        if (!append) {
          currentPage = 1;
          document.getElementById('gallery').innerHTML = '';
        }
        document.getElementById('loading').style.display = 'block';
        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('load-more-btn').style.display = 'none';

        var url = HEALTH_BASE + '/fame?page=' + currentPage + '&per_page=' + perPage +
          '&sort=' + currentSort;
        if (currentFilter) url += '&type=' + currentFilter;
        if (currentTag) url += '&tag=' + encodeURIComponent(currentTag);

        var token = getCfToken();
        if (token) url += '&cf_token=' + encodeURIComponent(token);

        fetch(url)
          .then(function (r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json();
          })
          .then(function (data) {
            document.getElementById('loading').style.display = 'none';
            totalEntries = data.total || 0;
            var entries = data.entries || [];

            if (entries.length === 0 && currentPage === 1) {
              document.getElementById('empty-state').style.display = 'block';
              return;
            }

            var gallery = document.getElementById('gallery');
            entries.forEach(function (entry) {
              gallery.appendChild(createCard(entry));
            });

            // Init tooltips on new cards
            gallery.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(function (el) {
              new bootstrap.Tooltip(el);
            });

            if (currentPage * perPage < totalEntries) {
              document.getElementById('load-more-btn').style.display = 'inline-block';
            }
          })
          .catch(function (err) {
            console.error('Failed to load fame entries:', err);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('empty-state').style.display = 'block';
          });
      }

      function createCard(entry) {
        var col = document.createElement('div');
        col.className = 'col-sm-6 col-lg-4';
        col.id = 'fame-entry-' + entry.id;

        var card = document.createElement('div');
        card.className = 'fame-card position-relative';

        // Media
        var mediaHtml = '';
        var mediaUrl = entry.media_url || entry.url || '';
        var ytId = extractYouTubeId(mediaUrl);

        if (ytId) {
          mediaHtml = '<div class="fame-embed"><iframe src="https://www.youtube-nocookie.com/embed/' +
            escapeHtml(ytId) + '" allowfullscreen loading="lazy"></iframe></div>';
        } else if (entry.media_type === 'video') {
          mediaHtml = '<video src="' + escapeHtml(mediaUrl) + '" preload="metadata" muted loop ' +
            'onclick="openLightbox(this)" onmouseenter="this.play()" onmouseleave="this.pause()"></video>';
        } else {
          mediaHtml = '<img src="' + escapeHtml(mediaUrl) + '" alt="' + escapeHtml(entry.title) +
            '" loading="lazy" onclick="openLightbox(this)" />';
        }

        // Delete button (owner or admin)
        var canDelete = false;
        if (currentUser) {
          var isAdmin = false;
          try { isAdmin = MeduseldAuth.hasRole('admin'); } catch (e) { /* ignore */ }
          if (isAdmin || (entry.user_id && currentUser.id === entry.user_id)) {
            canDelete = true;
          }
        }
        var deleteHtml = canDelete
          ? '<button class="delete-btn" onclick="deleteEntry(' + entry.id + ', event)" ' +
            'data-bs-toggle="tooltip" data-bs-title="Delete entry"><i class="bi bi-trash"></i></button>'
          : '';

        // Vote button
        var votedClass = entry.voted ? ' voted' : '';
        var voteIcon = entry.voted ? 'bi-heart-fill' : 'bi-heart';

        var timeAgo = formatTimeAgo(entry.created_at);
        var avatarHtml = entry.avatar_url
          ? '<img src="' + escapeHtml(entry.avatar_url) + '" alt="" />'
          : '<i class="bi bi-person-circle" style="font-size:1.1rem;color:#6c757d"></i>';

        card.innerHTML = deleteHtml + mediaHtml +
          '<div class="fame-body">' +
            '<div class="fame-title">' + escapeHtml(entry.title) +
              (entry.tag ? ' <span class="tag-badge">' + escapeHtml(entry.tag) + '</span>' : '') +
            '</div>' +
            (entry.caption ? '<div class="fame-caption">' + escapeHtml(entry.caption) + '</div>' : '') +
            '<div class="fame-meta">' +
              '<div class="fame-user">' + avatarHtml +
                '<span>' + escapeHtml(entry.display_name || 'Unknown') + '</span>' +
                '<span class="ms-1">' + escapeHtml(timeAgo) + '</span>' +
              '</div>' +
              '<button class="vote-btn' + votedClass + '" id="vote-btn-' + entry.id + '" onclick="toggleVote(' + entry.id + ', event)">' +
                '<i class="bi ' + voteIcon + '"></i> <span>' + (entry.vote_count || 0) + '</span>' +
              '</button>' +
            '</div>' +
          '</div>';

        col.appendChild(card);
        return col;
      }

      function extractYouTubeId(url) {
        if (!url) return null;
        var m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
        return m ? m[1] : null;
      }

      function formatTimeAgo(iso) {
        if (!iso) return '';
        var d = new Date(iso);
        var now = new Date();
        var diff = Math.floor((now - d) / 1000);
        if (diff < 60) return 'just now';
        if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
        if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
        if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
        return d.toLocaleDateString();
      }

      function setFilter(btn, filter) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn[data-filter]').forEach(function (b) {
          b.classList.toggle('active', b.getAttribute('data-filter') === filter);
        });
        loadEntries(false);
      }

      function setSort(btn, sort) {
        currentSort = sort;
        document.querySelectorAll('.filter-btn[data-sort]').forEach(function (b) {
          b.classList.toggle('active', b.getAttribute('data-sort') === sort);
        });
        loadEntries(false);
      }

      function setTag(btn, tag) {
        currentTag = tag;
        document.querySelectorAll('.filter-btn[data-tag]').forEach(function (b) {
          b.classList.toggle('active', b.getAttribute('data-tag') === tag);
        });
        loadEntries(false);
      }

      function loadMore() {
        currentPage++;
        loadEntries(true);
      }

      function toggleVote(entryId, event) {
        event.stopPropagation();
        var token = getCfToken();
        if (!token) { alert('Please log in to vote.'); return; }

        fetch(HEALTH_BASE + '/fame-' + entryId + '-vote', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ _cf_token: token }),
        })
          .then(function (r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json();
          })
          .then(function (data) {
            var btn = document.getElementById('vote-btn-' + entryId);
            if (!btn) return;
            btn.classList.toggle('voted', data.voted);
            var icon = btn.querySelector('i');
            icon.className = data.voted ? 'bi bi-heart-fill' : 'bi bi-heart';
            btn.querySelector('span').textContent = data.vote_count;
          })
          .catch(function (err) {
            console.error('Failed to toggle vote:', err);
          });
      }

      function deleteEntry(entryId, event) {
        event.stopPropagation();
        if (!confirm('Delete this entry?')) return;
        var token = getCfToken();

        fetch(HEALTH_BASE + '/fame-' + entryId + '?cf_token=' + encodeURIComponent(token), {
          method: 'DELETE',
        })
          .then(function (r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json();
          })
          .then(function () {
            var el = document.getElementById('fame-entry-' + entryId);
            if (el) el.remove();
            totalEntries--;
            if (totalEntries <= 0) {
              document.getElementById('empty-state').style.display = 'block';
            }
          })
          .catch(function (err) {
            console.error('Failed to delete fame entry:', err);
            alert('Delete failed.');
          });
      }

      function openLightbox(el) {
        var overlay = document.createElement('div');
        overlay.className = 'lightbox-overlay';
        overlay.onclick = function () { document.body.removeChild(overlay); };

        if (el.tagName === 'VIDEO') {
          var v = document.createElement('video');
          v.src = el.src;
          v.controls = true;
          v.autoplay = true;
          v.style.maxWidth = '95vw';
          v.style.maxHeight = '90vh';
          v.onclick = function (e) { e.stopPropagation(); };
          overlay.appendChild(v);
        } else {
          var img = document.createElement('img');
          img.src = el.src;
          img.alt = el.alt || '';
          overlay.appendChild(img);
        }
        document.body.appendChild(overlay);
      }

      // Submit modal
      function openSubmitModal() {
        var token = getCfToken();
        if (!token) { alert('Please log in to submit entries.'); return; }
        document.getElementById('submit-error').style.display = 'none';
        document.getElementById('upload-title').value = '';
        document.getElementById('upload-caption').value = '';
        document.getElementById('upload-tag').value = '';
        document.getElementById('upload-file').value = '';
        document.getElementById('upload-preview').style.display = 'none';
        document.getElementById('link-title').value = '';
        document.getElementById('link-caption').value = '';
        document.getElementById('link-tag').value = '';
        document.getElementById('link-url').value = '';
        document.getElementById('submit-btn').disabled = false;
        switchTab('upload');
        if (!submitModal) submitModal = new bootstrap.Modal(document.getElementById('submitModal'));
        submitModal.show();
      }

      var currentTab = 'upload';
      function switchTab(tab) {
        currentTab = tab;
        document.getElementById('form-upload').style.display = tab === 'upload' ? 'block' : 'none';
        document.getElementById('form-link').style.display = tab === 'link' ? 'block' : 'none';
        document.getElementById('tab-upload').classList.toggle('active', tab === 'upload');
        document.getElementById('tab-link').classList.toggle('active', tab === 'link');
      }

      // File preview
      document.getElementById('upload-file').addEventListener('change', function () {
        var preview = document.getElementById('upload-preview');
        preview.innerHTML = '';
        preview.style.display = 'none';
        if (!this.files || !this.files[0]) return;
        var file = this.files[0];
        var url = URL.createObjectURL(file);
        if (file.type.startsWith('image/')) {
          preview.innerHTML = '<img src="' + url + '" style="max-height:150px;border-radius:8px" />';
          preview.style.display = 'block';
        } else if (file.type.startsWith('video/')) {
          preview.innerHTML = '<video src="' + url + '" style="max-height:150px;border-radius:8px" muted autoplay loop></video>';
          preview.style.display = 'block';
        }
      });

      function submitEntry() {
        var errEl = document.getElementById('submit-error');
        errEl.style.display = 'none';
        var token = getCfToken();
        var btn = document.getElementById('submit-btn');
        btn.disabled = true;

        if (currentTab === 'upload') {
          var title = document.getElementById('upload-title').value.trim();
          var caption = document.getElementById('upload-caption').value.trim();
          var tag = document.getElementById('upload-tag').value.trim();
          var fileInput = document.getElementById('upload-file');
          if (!title) { showError('Title is required.'); btn.disabled = false; return; }
          if (!fileInput.files || !fileInput.files[0]) { showError('Please select a file.'); btn.disabled = false; return; }

          var formData = new FormData();
          formData.append('title', title);
          formData.append('caption', caption);
          formData.append('tag', tag);
          formData.append('file', fileInput.files[0]);
          formData.append('_cf_token', token);

          fetch(HEALTH_BASE + '/fame', {
            method: 'POST',
            body: formData,
          })
            .then(handleSubmitResponse)
            .catch(function (err) {
              console.error('Failed to upload fame entry:', err);
              showError('Upload failed. Please try again.');
              btn.disabled = false;
            });
        } else {
          var title = document.getElementById('link-title').value.trim();
          var caption = document.getElementById('link-caption').value.trim();
          var tag = document.getElementById('link-tag').value.trim();
          var url = document.getElementById('link-url').value.trim();
          var mediaType = document.getElementById('link-type').value;
          if (!title) { showError('Title is required.'); btn.disabled = false; return; }
          if (!url) { showError('URL is required.'); btn.disabled = false; return; }

          fetch(HEALTH_BASE + '/fame', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: title, caption: caption, tag: tag, url: url, media_type: mediaType, _cf_token: token }),
          })
            .then(handleSubmitResponse)
            .catch(function (err) {
              console.error('Failed to submit fame link:', err);
              showError('Submit failed. Please try again.');
              btn.disabled = false;
            });
        }
      }

      function handleSubmitResponse(r) {
        if (!r.ok) {
          return r.json().then(function (d) {
            showError(d.error || 'Submit failed.');
            document.getElementById('submit-btn').disabled = false;
          });
        }
        return r.json().then(function (data) {
          if (submitModal) submitModal.hide();
          // Prepend new entry to gallery
          if (data.entry) {
            var gallery = document.getElementById('gallery');
            var card = createCard(data.entry);
            if (gallery.firstChild) {
              gallery.insertBefore(card, gallery.firstChild);
            } else {
              gallery.appendChild(card);
            }
            document.getElementById('empty-state').style.display = 'none';
            // Init tooltips on new card
            card.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(function (el) {
              new bootstrap.Tooltip(el);
            });
          }
          document.getElementById('submit-btn').disabled = false;
        });
      }

      function showError(msg) {
        var el = document.getElementById('submit-error');
        el.textContent = msg;
        el.style.display = 'block';
      }

      // Load tags from API, merge with defaults (case-insensitive dedup)
      function loadTags() {
        fetch(HEALTH_BASE + '/fame-tags')
          .then(function (r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json();
          })
          .then(function (data) {
            var serverTags = data.tags || [];
            var seen = {};
            var merged = [];
            // Add defaults first
            DEFAULT_TAGS.forEach(function (t) {
              var key = t.toLowerCase();
              if (!seen[key]) { seen[key] = true; merged.push(t); }
            });
            // Add server tags (skip case-insensitive dupes)
            serverTags.forEach(function (t) {
              var key = t.toLowerCase();
              if (!seen[key]) { seen[key] = true; merged.push(t); }
            });
            allTags = merged;
            renderTagFilters();
            renderTagDatalist();
          })
          .catch(function (err) {
            console.error('Failed to load fame tags:', err);
            allTags = DEFAULT_TAGS.slice();
            renderTagFilters();
            renderTagDatalist();
          });
      }

      function renderTagFilters() {
        var row = document.getElementById('tag-filter-row');
        // Dispose existing tooltips
        row.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(function (el) {
          var tip = bootstrap.Tooltip.getInstance(el);
          if (tip) tip.dispose();
        });
        row.innerHTML = '<button class="filter-btn active" data-tag="" onclick="setTag(this, \'\')">All Games</button>';
        allTags.forEach(function (tag) {
          var btn = document.createElement('button');
          btn.className = 'filter-btn';
          btn.setAttribute('data-tag', tag);
          btn.textContent = tag;
          btn.onclick = function () { setTag(btn, tag); };
          row.appendChild(btn);
        });
      }

      function renderTagDatalist() {
        // Wire up custom dropdowns for both tag inputs
        ['upload-tag', 'link-tag'].forEach(function (inputId) {
          var input = document.getElementById(inputId);
          var dropdown = document.getElementById(inputId + '-dropdown');
          var activeIdx = -1;

          function showDropdown(filter) {
            var val = (filter || '').toLowerCase();
            var matches = val ? allTags.filter(function (t) { return t.toLowerCase().indexOf(val) !== -1; }) : allTags;
            if (!matches.length) { dropdown.classList.remove('show'); return; }
            dropdown.innerHTML = '';
            activeIdx = -1;
            matches.forEach(function (tag) {
              var item = document.createElement('div');
              item.className = 'tag-dropdown-item';
              item.textContent = tag;
              item.onmousedown = function (e) {
                e.preventDefault();
                input.value = tag;
                dropdown.classList.remove('show');
              };
              dropdown.appendChild(item);
            });
            dropdown.classList.add('show');
          }

          input.addEventListener('focus', function () { showDropdown(input.value); });
          input.addEventListener('input', function () { showDropdown(input.value); });
          input.addEventListener('blur', function () { dropdown.classList.remove('show'); });
          input.addEventListener('keydown', function (e) {
            var items = dropdown.querySelectorAll('.tag-dropdown-item');
            if (!items.length || !dropdown.classList.contains('show')) return;
            if (e.key === 'ArrowDown') {
              e.preventDefault();
              activeIdx = Math.min(activeIdx + 1, items.length - 1);
              items.forEach(function (it, i) { it.classList.toggle('active', i === activeIdx); });
              items[activeIdx].scrollIntoView({ block: 'nearest' });
            } else if (e.key === 'ArrowUp') {
              e.preventDefault();
              activeIdx = Math.max(activeIdx - 1, 0);
              items.forEach(function (it, i) { it.classList.toggle('active', i === activeIdx); });
              items[activeIdx].scrollIntoView({ block: 'nearest' });
            } else if (e.key === 'Enter' && activeIdx >= 0) {
              e.preventDefault();
              input.value = items[activeIdx].textContent;
              dropdown.classList.remove('show');
            } else if (e.key === 'Escape') {
              dropdown.classList.remove('show');
            }
          });
        });
      }

      // Init
      loadTags();
      loadEntries(false);
    })();
    </script>
  </body>
</html>
